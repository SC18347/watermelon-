<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS v1.2</title>


<style>

:root{
--bg:#0b0f14;
--panel:#121922;
--text:#e8f0ff;
--accent:#4da3ff;
--border:#263445;
}


*{
box-sizing:border-box;
}


body{

margin:0;
height:100vh;

background:var(--bg);
color:var(--text);

font-family:Arial,Helvetica,sans-serif;

display:flex;
justify-content:center;
align-items:center;

}



.app{

width:min(100%,950px);
height:100vh;
max-height:950px;

display:flex;
flex-direction:column;

background:var(--panel);

border:1px solid var(--border);

}



header{

padding:18px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:1px solid var(--border);

}



.logo{

font-size:26px;
font-weight:bold;

color:var(--accent);

}



.status{

font-size:12px;
opacity:.8;

}



#tools{

display:flex;
gap:8px;

padding:10px;

border-bottom:1px solid var(--border);

overflow-x:auto;

}



.tool{

background:#182331;

color:white;

border:1px solid var(--border);

padding:8px 12px;

border-radius:8px;

cursor:pointer;

}



.tool.active{

background:var(--accent);

color:#001020;

}



#chat{

flex:1;

overflow-y:auto;

padding:20px;

}



.message{

max-width:85%;

padding:12px 15px;

margin-bottom:14px;

border-radius:12px;

line-height:1.5;

white-space:pre-wrap;

}



.user{

margin-left:auto;

background:#1d3552;

}



.jarvis{

background:#182331;

}



#panel{

display:none;

padding:15px;

border-top:1px solid var(--border);

background:#0d141d;

}



select,
textarea{

width:100%;

background:#0b1119;

color:white;

border:1px solid var(--border);

border-radius:8px;

padding:10px;

}



textarea{

height:120px;

resize:none;

}



footer{

display:flex;

gap:10px;

padding:15px;

border-top:1px solid var(--border);

}



input{

flex:1;

background:#0b1119;

color:white;

border:1px solid var(--border);

padding:12px;

border-radius:8px;

}



button{

background:var(--accent);

color:#001020;

font-weight:bold;

border:0;

border-radius:8px;

padding:12px 16px;

cursor:pointer;

}


</style>

</head>



<body>


<div class="app">


<header>

<div class="logo">
JARVIS
</div>


<div class="status">
ONLINE • v1.2 STABLE
</div>


</header>



<div id="tools">


<button class="tool active" onclick="setMode('chat')">
Chat
</button>


<button class="tool" onclick="setMode('math')">
Math
</button>


<button class="tool" onclick="setMode('writing')">
Writing
</button>


<button class="tool" onclick="setExplanation('simple')">
Simple
</button>


<button class="tool" onclick="setExplanation('detailed')">
Detailed
</button>


<button class="tool" onclick="setExplanation('expert')">
Expert
</button>


</div>




<div id="panel">


<select id="writingMode">

<option value="grammar">
Fix grammar only
</option>


<option value="professional">
Make it more professional
</option>


<option value="friendly">
Make it friendlier
</option>


<option value="shorter">
Make it shorter
</option>


<option value="clarity">
Keep my exact tone but improve clarity
</option>


</select>



<textarea id="writingInput"
placeholder="Paste text here...">
</textarea>


<button onclick="processWriting()">
Improve Writing
</button>


</div>





<div id="chat"></div>




<footer>


<input id="input"
placeholder="Ask JARVIS something...">


<button onclick="sendMessage()">
Send
</button>


</footer>



</div>


<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const panel=document.getElementById("panel");


let currentMode="chat";

let explanationMode="normal";


let memory=JSON.parse(
localStorage.getItem("jarvisMemory") || "{}"
);


if(!memory.notes){
memory.notes=[];
}



let context={

topic:""

};



/* =========================
   CHAT DISPLAY
========================= */


function addMessage(text,type){

let div=document.createElement("div");

div.className="message "+type;

div.textContent=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}



/* =========================
   MODES
========================= */


function setMode(mode){

currentMode=mode;


if(mode==="writing"){

panel.style.display="block";

addMessage(
"Fixing mode activated.",
"jarvis"
);

}

else{

panel.style.display="none";

}


if(mode==="math"){

addMessage(
"Math mode activated.",
"jarvis"
);

}


if(mode==="chat"){

addMessage(
"Chatting mode activated.",
"jarvis"
);

}

}



function setExplanation(mode){

explanationMode=mode;


addMessage(
"Explanation mode: "+mode,
"jarvis"
);

}



/* =========================
   KNOWLEDGE SYSTEM
========================= */

function explain(text){


if(explanationMode==="simple"){

return "Simple explanation:\n\n"+text;

}


if(explanationMode==="detailed"){

return `
Detailed explanation:

${text}

Additional details:
- How it works
- Why it matters
- Real world examples
`;

}



if(explanationMode==="expert"){

return `
Technical explanation:

${text}

This topic can be studied through advanced systems, structures, and deeper relationships.
`;

}


return text;

}




/* =========================
   MATH ENGINE
========================= */


function mathEngine(problem){


let clean=problem
.replace(/solve|calculate|what is/gi,"")
.trim();



if(/^[0-9+\-*/().\s]+$/.test(clean)){


try{

let answer=Function(
"return "+clean
)();


return `
Math solution:

Problem:
${clean}

Step 1:
Identify the operation.

Step 2:
Apply mathematical rules.

Step 3:
Calculate.

Answer:
${answer}
`;

}

catch{}

}




if(clean.includes("circle")){

return `
Circle formulas:

Area = πr²

Circumference = 2πr

Provide the radius for a calculation.
`;

}




if(clean.includes("derivative")){


return `
Calculus:

Derivative rules find the rate of change.

Example:

d/dx(x²)=2x

Provide a function for a full solution.
`;

}



return `
Math Engine ready.

I can help with:

- Algebra
- Geometry
- Calculus
- Statistics
- Equations
`;

}



/* =========================
   WRITING ASSISTANT
========================= */


function processWriting(){


let text=document
.getElementById("writingInput")
.value;


let mode=document
.getElementById("writingMode")
.value;


if(!text)return;



let result=text;



if(mode==="grammar"){

result=text
.replace(/\bi\b/g,"I")
.trim();

}



if(mode==="professional"){

result=
"Professional version:\n\n"+text;

}



if(mode==="friendly"){

result=
"Friendlier version:\n\n"+text;

}



if(mode==="shorter"){

result=
text.split(".")[0]+".";

}



if(mode==="clarity"){

result=
"Improved clarity while keeping your tone:\n\n"+text;

}



addMessage(result,"jarvis");


}



/* =========================
   JARVIS BRAIN
========================= */


function jarvisReply(message){


let text=message.toLowerCase();



if(currentMode==="math"){

return mathEngine(message);

}





for(let item in knowledge){


for(let keyword of knowledge[item].keywords){


if(text.includes(keyword)){


context.topic=item;


return explain(
knowledge[item].text
);


}


}


}





if(
context.topic &&
(
text.includes("how") ||
text.includes("why") ||
text.includes("more")
)
){


return explain(
knowledge[context.topic].text
);

}




if(text.includes("hello")||
text.includes("hi")){

return "Hello. JARVIS systems are online.";

}



if(text.includes("your name")){

return "I am JARVIS, your personal intelligence assistant.";

}





if(text.includes("remember")){


let note=message
.replace(/remember/i,"")
.trim();



memory.notes.push({

text:note,

date:new Date()
.toLocaleString()

});



localStorage.setItem(
"jarvisMemory",
JSON.stringify(memory)
);



return "Memory saved.";

}




if(text.includes("memory")){


if(memory.notes.length===0){

return "No memories saved.";

}



return memory.notes
.map(
(x,i)=>
`${i+1}. ${x.text} (${x.date})`
)
.join("\n");

}





if(text.includes("tell me about")||
text.includes("what is")||
text.includes("explain")){


let topic=message
.replace(/tell me about|what is|explain/gi,"")
.trim();


return `
I can explain ${topic}.

I can provide a simple, detailed, or expert explanation.
`;

}





return `
I understand.

I can answer questions, explain topics, help with writing, solve math problems, and remember information.
`;

}



/* =========================
   INPUT
========================= */


function sendMessage(){


let text=input.value.trim();


if(!text)return;


addMessage(text,"user");


input.value="";


setTimeout(()=>{


addMessage(
jarvisReply(text),
"jarvis"
);


},300);


}



input.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

sendMessage();

}

});
addMessage(
"JARVIS v1.2 initialized. Intelligence systems online.",
"jarvis"
);
