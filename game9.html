<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS v3</title>

<style>

:root{
--bg:#080c12;
--panel:#121922;
--panel2:#182331;
--text:#e8f0ff;
--accent:#4da3ff;
--border:#263445;
}


*{
box-sizing:border-box;
}


body{

margin:0;
height:100vh;
background:var(--bg);
color:var(--text);
font-family:Arial,Helvetica,sans-serif;

display:flex;
justify-content:center;
align-items:center;

}



.app{

width:min(100%,1000px);
height:100vh;
max-height:950px;

background:var(--panel);

display:flex;
flex-direction:column;

border:1px solid var(--border);

}



header{

padding:18px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:1px solid var(--border);

}



.logo{

font-size:30px;
font-weight:bold;
color:var(--accent);

}



.status{

font-size:12px;

}



#tools{

display:flex;
gap:8px;

padding:10px;

border-bottom:1px solid var(--border);

overflow-x:auto;

}



.tool{

background:var(--panel2);

color:white;

border:1px solid var(--border);

padding:8px 14px;

border-radius:8px;

cursor:pointer;

}



.tool.active{

background:var(--accent);

color:#001020;

}



#chat{

flex:1;

overflow-y:auto;

padding:20px;

}



.message{

max-width:85%;

padding:12px 15px;

border-radius:12px;

margin-bottom:12px;

white-space:pre-wrap;

line-height:1.5;

}



.user{

margin-left:auto;

background:#1d3552;

}



.jarvis{

background:#182331;

}



#panel{

display:none;

padding:15px;

border-top:1px solid var(--border);

}



textarea,
select,
input{

width:100%;

background:#0b1119;

color:white;

border:1px solid var(--border);

padding:12px;

border-radius:8px;

}



textarea{

height:120px;

}



button{

background:var(--accent);

color:#001020;

border:0;

padding:12px 16px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}



footer{

display:flex;

gap:10px;

padding:15px;

border-top:1px solid var(--border);

}



footer input{

flex:1;

}



</style>

</head>


<body>


<div class="app">


<header>

<div class="logo">
JARVIS
</div>


<div class="status">
ONLINE • V3 CORE
</div>


</header>



<div id="tools">


<button class="tool active" onclick="setMode('chat',this)">
Chat
</button>


<button class="tool" onclick="setMode('math',this)">
Math
</button>


<button class="tool" onclick="setMode('writing',this)">
Writing
</button>


<button class="tool" onclick="setExplanation('simple')">
Simple
</button>


<button class="tool" onclick="setExplanation('detailed')">
Detailed
</button>


<button class="tool" onclick="setExplanation('expert')">
Expert
</button>


</div>




<div id="panel">


<select id="writingMode">

<option value="grammar">
Fix grammar
</option>

<option value="professional">
Professional
</option>

<option value="friendly">
Friendly
</option>

<option value="shorter">
Shorter
</option>


</select>


<textarea id="writingInput"
placeholder="Enter text..."></textarea>


<button onclick="processWriting()">
Improve
</button>


</div>




<div id="chat"></div>




<footer>


<input id="input"
placeholder="Ask JARVIS...">


<button onclick="sendMessage()">
Send
</button>


</footer>



</div>



<script>


// ============================
// JARVIS V3 CORE
// ============================


const chat=document.getElementById("chat");

const input=document.getElementById("input");

const panel=document.getElementById("panel");



let currentMode="chat";

let explanationMode="normal";



// MEMORY STORAGE


let memory=

JSON.parse(

localStorage.getItem("jarvisMemory") || 
'{"notes":[]}'

);



// CONTEXT


let context={

topic:null,

category:null,

lastAnswer:null

};





// MESSAGE SYSTEM


function addMessage(text,type){


let div=document.createElement("div");


div.className="message "+type;


div.textContent=text;


chat.appendChild(div);


chat.scrollTop=chat.scrollHeight;


}





// MODE SYSTEM


function setMode(mode,button){


currentMode=mode;


document.querySelectorAll(".tool")

.forEach(btn=>{

btn.classList.remove("active");

});


if(button){

button.classList.add("active");

}



if(mode==="writing"){

panel.style.display="block";

}

else{

panel.style.display="none";

}



addMessage(

mode+" mode activated.",

"jarvis"

);


}





function setExplanation(mode){


explanationMode=mode;


addMessage(

mode+" explanation mode activated.",

"jarvis"

);


}





// SAVE MEMORY


function saveMemory(){


localStorage.setItem(

"jarvisMemory",

JSON.stringify(memory)

);


}
// ============================
// KNOWLEDGE DATABASE
// ============================


const knowledge = {


orange:{

keywords:[
"orange",
"oranges",
"citrus"
],

answer:
"Oranges are citrus fruits that grow on trees. They contain vitamin C and are commonly eaten fresh or made into juice."

},



car:{

keywords:[
"car",
"cars",
"vehicle",
"vehicles"
],

answer:
"Cars are transportation machines made of systems including engines, transmissions, brakes, suspension, and electronics."

},



engine:{

keywords:[
"engine",
"motor"
],

answer:
"An engine converts energy into motion. Combustion engines use fuel and air to create mechanical power."

},



space:{

keywords:[
"space",
"universe",
"galaxy"
],

answer:
"Space is the area beyond Earth's atmosphere containing planets, stars, galaxies, and other objects."

},



computer:{

keywords:[
"computer",
"cpu",
"pc"
],

answer:
"Computers process information using hardware and software. Main parts include processors, memory, storage, and programs."

},



ai:{

keywords:[
"ai",
"artificial intelligence",
"machine learning"
],

answer:
"Artificial intelligence allows computers to perform tasks involving learning, reasoning, and pattern recognition."

},



money:{

keywords:[
"money",
"finance",
"financial"
],

answer:
"Finance involves managing money through saving, investing, budgeting, and planning."

}



};





// ============================
// EXPLANATION ENGINE
// ============================


function explain(text){


if(explanationMode==="simple"){


return "Simple explanation:\n\n"+text;


}



if(explanationMode==="detailed"){


return "Detailed explanation:\n\n"+text+
"\n\nI can provide more examples if needed.";

}



if(explanationMode==="expert"){


return "Expert explanation:\n\n"+text+
"\n\nThis focuses on deeper concepts and systems.";

}



return text;


}







// ============================
// CONTEXT SYSTEM
// ============================


function updateContext(topic,answer){


context.topic=topic;

context.lastAnswer=answer;


}




function resolveContext(message){


if(!context.topic)

return null;



let words=[

"more",

"why",

"how",

"explain",

"continue",

"that",

"it"

];



let text=message.toLowerCase();



if(words.some(word=>text.includes(word))){


return context;


}



return null;


}







// ============================
// INTENT DETECTION
// ============================


function detectIntent(message){


let text=message.toLowerCase();



if(
text.includes("what is") ||
text.includes("explain") ||
text.includes("tell me")
){

return "knowledge";

}



if(
text.includes("how do i") ||
text.includes("how can i")
){

return "problem";

}



if(
text.includes("remember")
){

return "memory";

}



if(
text.includes("time")
){

return "time";

}



return "unknown";


}







// ============================
// REASONING ENGINE
// ============================


function reasoningEngine(message){


let intent=detectIntent(message);



if(intent==="problem"){


return `

I can help solve that.

To give a useful answer, I need:

• The goal
• The problem
• Any limits or requirements

`;

}



if(intent==="time"){


return "The current time is "+

new Date().toLocaleTimeString();


}



return null;


}







// ============================
// SMART KNOWLEDGE SEARCH
// ============================


function searchKnowledge(message){


let text=message.toLowerCase();



for(let item in knowledge){


for(let keyword of knowledge[item].keywords){


if(text.includes(keyword)){


updateContext(

item,

knowledge[item].answer

);



return explain(

knowledge[item].answer

);


}



}



}



return null;


}







// ============================
// MAIN INTELLIGENCE ROUTER
// ============================


function jarvisReply(message){



let contextReply=

resolveContext(message);



if(contextReply){


return explain(

contextReply.lastAnswer

);


}





let reasoning=

reasoningEngine(message);



if(reasoning){

return reasoning;

}





let knowledgeReply=

searchKnowledge(message);



if(knowledgeReply){

return knowledgeReply;

}





let text=message.toLowerCase();





if(
text.includes("hello") ||
text.includes("hi") ||
text.includes("hey")
){


return "Hello. JARVIS V3 systems are online.";


}





if(
text.includes("your name")
){


return "I am JARVIS, your personal intelligence assistant.";


}





return `

I understand.

Current capabilities:

• Knowledge
• Reasoning
• Memory
• Writing
• Mathematics
• Context awareness

`;

}
// ============================
// MEMORY SYSTEM
// ============================


function remember(text){


memory.notes.push({

text:text,

date:new Date().toLocaleString()

});


saveMemory();


return "Memory saved.";

}




function readMemory(){


if(memory.notes.length===0){

return "I do not have any saved memories.";

}



return memory.notes.map(

(note,index)=>

`${index+1}. ${note.text} (${note.date})`

).join("\n\n");


}






// ============================
// MATH ENGINE
// ============================


function mathEngine(problem){


let clean=

problem

.replace(/solve|calculate|what is/gi,"")

.trim();



if(

/^[0-9+\-*/().\s]+$/.test(clean)

){


try{


let answer=

Function(

"return "+clean

)();



return `

Math Solution:

Problem:
${clean}

Answer:
${answer}

`;



}

catch(e){}



}



return `

Math mode active.

I can help with:

• Arithmetic
• Algebra
• Geometry
• Calculations

`;

}







// ============================
// WRITING ASSISTANT
// ============================


function processWriting(){


let text=

document.getElementById(

"writingInput"

).value;



let mode=

document.getElementById(

"writingMode"

).value;



if(!text.trim()){

return;

}



let result=text;



if(mode==="grammar"){


result=

text.replace(

/\bi\b/g,

"I"

);


}



if(mode==="professional"){


result=

"Professional version:\n\n"+text;


}



if(mode==="friendly"){


result=

"Friendly version:\n\n"+text;


}



if(mode==="shorter"){


result=

text.split(".")

.slice(0,2)

.join(".")+".";


}



addMessage(

result,

"jarvis"

);



}








// ============================
// CALENDAR SYSTEM
// ============================


let calendar=

JSON.parse(

localStorage.getItem(

"jarvisCalendar"

)||"[]"

);





function saveCalendar(){


localStorage.setItem(

"jarvisCalendar",

JSON.stringify(calendar)

);


}






function addEvent(name){


calendar.push({

name:name,

date:new Date().toLocaleString()

});



saveCalendar();



return "Calendar event added: "+name;


}







function showCalendar(){


if(calendar.length===0){


return "Calendar is empty.";

}



return calendar.map(

(event,index)=>

`${index+1}. ${event.name} - ${event.date}`

).join("\n\n");


}






function calendarSystem(message){


let text=

message.toLowerCase();





if(
text.includes("add") &&
text.includes("event")
){


let name=

message

.replace(/add|event/gi,"")

.trim();



return addEvent(name);


}





if(
text.includes("calendar") ||
text.includes("schedule")
){


return showCalendar();


}





return null;


}









// ============================
// PERSONALITY SYSTEM
// ============================


function personalityCheck(message){


let text=

message.toLowerCase();



if(text.includes("thank")){


return "You're welcome. I am always ready to assist.";


}



if(text.includes("good morning")){


return "Good morning. JARVIS systems are online.";


}



if(text.includes("good night")){


return "Good night. Systems remain available when needed.";


}



return null;


}








// ============================
// UPGRADED RESPONSE ROUTER
// ============================


const oldJarvisReply = jarvisReply;



jarvisReply=function(message){



let personality=

personalityCheck(message);



if(personality){

return personality;

}





let calendarReply=

calendarSystem(message);



if(calendarReply){

return calendarReply;

}





let text=

message.toLowerCase();



if(currentMode==="math"){


return mathEngine(message);


}





if(text.includes("remember")){


return remember(

message.replace(/remember/gi,"").trim()

);


}





if(text.includes("memory")){


return readMemory();


}





return oldJarvisReply(message);



};
// ============================
// FINAL COMMAND SYSTEM
// ============================


function commandSystem(message){


let text=message.toLowerCase();



if(text==="clear"){


chat.innerHTML="";


return "Chat cleared.";


}



if(text.includes("status")){


return `

JARVIS V3 STATUS

System: ONLINE

Mode: ${currentMode}

Memory:
${memory.notes.length} items

Calendar:
${calendar.length} events

Context:
${context.topic || "None"}

`;

}



return null;


}








// ============================
// FINAL SEND SYSTEM
// ============================


function sendMessage(){


let text=input.value.trim();



if(!text){

return;

}



addMessage(

text,

"user"

);



input.value="";



setTimeout(()=>{



let command=

commandSystem(text);



let reply;



if(command){


reply=command;


}

else{


reply=jarvisReply(text);


}



addMessage(

reply,

"jarvis"

);



},250);



}









// ============================
// ENTER KEY SUPPORT
// ============================


input.addEventListener(

"keydown",

function(event){


if(event.key==="Enter"){


sendMessage();


}


});








// ============================
// BUTTON CONNECTION SYSTEM
// ============================


document

.querySelectorAll(".tool")

.forEach(button=>{


button.addEventListener(

"click",

()=>{


document

.querySelectorAll(".tool")

.forEach(btn=>{

btn.classList.remove("active");

});


button.classList.add("active");


}

);


});









// ============================
// STARTUP SYSTEM
// ============================


function bootJarvis(){



addMessage(

"JARVIS V3 initialized.",

"jarvis"

);



addMessage(

"Intelligence core online. All systems ready.",

"jarvis"

);



}




bootJarvis();






</script>


</body>

</html>
