<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS V4</title>

<style>

:root{
--bg:#080c12;
--panel:#121922;
--panel2:#182331;
--text:#e8f0ff;
--accent:#4da3ff;
--border:#263445;
--danger:#ff5050;
}


*{
box-sizing:border-box;
}


body{

margin:0;
height:100vh;

background:var(--bg);

color:var(--text);

font-family:Arial,Helvetica,sans-serif;

display:flex;

justify-content:center;

align-items:center;

}



.app{

width:min(100%,1000px);

height:100vh;

max-height:950px;

background:var(--panel);

border:1px solid var(--border);

display:flex;

flex-direction:column;

}



header{

padding:18px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid var(--border);

}



.logo{

font-size:32px;

font-weight:bold;

color:var(--accent);

}



.status{

font-size:13px;

}



#tools{

display:flex;

gap:8px;

padding:10px;

overflow-x:auto;

border-bottom:1px solid var(--border);

}



.tool{

background:var(--panel2);

color:white;

border:1px solid var(--border);

padding:10px 14px;

border-radius:8px;

cursor:pointer;

}



.tool.active{

background:var(--accent);

color:#001020;

}



#chat{

flex:1;

overflow-y:auto;

padding:20px;

}



.message{

max-width:85%;

padding:12px 15px;

border-radius:12px;

margin-bottom:12px;

white-space:pre-wrap;

line-height:1.5;

}



.user{

margin-left:auto;

background:#1d3552;

}



.jarvis{

background:#182331;

}



footer{

display:flex;

gap:10px;

padding:15px;

border-top:1px solid var(--border);

}



input{

flex:1;

background:#0b1119;

color:white;

border:1px solid var(--border);

padding:12px;

border-radius:8px;

}



button{

background:var(--accent);

color:#001020;

border:0;

padding:12px 16px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}



/* =========================
VOICE OVERLAY
========================= */


#voiceOverlay{

position:fixed;

inset:0;

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

background:rgba(5,10,18,.75);

backdrop-filter:blur(15px);

z-index:9999;

}



#voiceBackground{

position:absolute;

inset:0;

background:
radial-gradient(circle,
rgba(77,163,255,.25),
transparent 65%);

}



#voiceCenter{

z-index:2;

display:flex;

flex-direction:column;

align-items:center;

}



#voiceOrb{

width:170px;

height:170px;

border-radius:50%;

background:
radial-gradient(circle,
#b5dcff,
#4da3ff,
#14549c);


box-shadow:

0 0 40px #4da3ff,
0 0 90px #4da3ff;


animation:pulse 2s infinite;

}



@keyframes pulse{

50%{

transform:scale(1.12);

}

}



#voiceTitle{

margin-top:35px;

font-size:36px;

letter-spacing:8px;

font-weight:bold;

}



#voiceSubtitle{

margin-top:15px;

font-size:18px;

}



#voiceStopButton{

position:absolute;

bottom:50px;

width:220px;

height:60px;

border-radius:40px;

background:var(--danger);

color:white;

font-size:20px;

}

</style>

</head>


<body>


<div class="app">


<header>

<div class="logo">
JARVIS
</div>


<div class="status">
V4 ONLINE
</div>

</header>


<div id="tools">


<button class="tool active">
Chat
</button>


<button class="tool">
Math
</button>


<button class="tool">
Writing
</button>


<button class="tool" onclick="startListening()">
🎤 Voice
</button>


</div>


<div id="chat"></div>


<footer>

<input id="input" placeholder="Ask JARVIS...">

<button onclick="sendMessage()">
Send
</button>

</footer>


</div>



<!-- VOICE MODE -->


<div id="voiceOverlay">


<div id="voiceBackground"></div>


<div id="voiceCenter">


<div id="voiceOrb"></div>


<div id="voiceTitle">
JARVIS
</div>


<div id="voiceSubtitle">
Listening...
</div>


</div>


<button id="voiceStopButton">
STOP
</button>


</div>
<script>

// ===============================
// JARVIS V4 CORE
// ===============================


const chat = document.getElementById("chat");
const input = document.getElementById("input");


let memory = JSON.parse(
localStorage.getItem("jarvisMemory") || '{"notes":[]}'
);



let context = {

topic:null,

answer:null

};





// ===============================
// MESSAGE SYSTEM
// ===============================


function addMessage(text,type){


let message=document.createElement("div");


message.className="message "+type;


message.textContent=text;


chat.appendChild(message);


chat.scrollTop=chat.scrollHeight;


}





// ===============================
// MEMORY SYSTEM
// ===============================


function saveMemory(){


localStorage.setItem(

"jarvisMemory",

JSON.stringify(memory)

);


}



function remember(text){


memory.notes.push({

text:text,

date:new Date().toLocaleString()

});


saveMemory();


return "Memory saved.";

}





function readMemory(){


if(memory.notes.length===0){

return "No memories saved.";

}


return memory.notes.map(

(item,index)=>

`${index+1}. ${item.text}`

).join("\n");

}





// ===============================
// KNOWLEDGE DATABASE
// ===============================


const knowledge={


ai:

"Artificial intelligence allows computers to perform tasks that normally require human intelligence such as learning and reasoning.",


computer:

"Computers use hardware and software to process information.",


car:

"Cars are machines designed for transportation using systems like engines, transmissions, brakes, and electronics.",


space:

"Space contains planets, stars, galaxies, and other objects beyond Earth's atmosphere.",


engine:

"An engine converts energy into motion.",


money:

"Money systems involve earning, saving, spending, and investing."

};






// ===============================
// KNOWLEDGE SEARCH
// ===============================


function searchKnowledge(text){


let message=text.toLowerCase();


for(let topic in knowledge){


if(message.includes(topic)){


context.topic=topic;

context.answer=knowledge[topic];


return knowledge[topic];

}


}


return null;


}







// ===============================
// RESPONSE ENGINE
// ===============================


function jarvisReply(message){


let text=message.toLowerCase();




// memory

if(text.startsWith("remember")){


return remember(

message.replace(/remember/i,"").trim()

);

}



if(text.includes("memory")){


return readMemory();

}





// context

if(
context.topic &&
(
text.includes("more") ||
text.includes("explain") ||
text.includes("why")
)

){

return context.answer;

}




// knowledge

let result=searchKnowledge(message);


if(result){

return result;

}





// personality


if(
text.includes("hello") ||
text.includes("hi") ||
text.includes("hey")
){

return "Hello. JARVIS systems are online.";

}



if(text.includes("your name")){


return "I am JARVIS, your personal intelligence assistant.";

}




if(text.includes("thank")){


return "You are welcome. Ready when needed.";

}





return `

I understand.

Current systems:

• Knowledge
• Memory
• Voice
• Commands

`;

}





// ===============================
// SEND SYSTEM
// ===============================


function sendMessage(){


let text=input.value.trim();


if(!text){

return;

}



addMessage(text,"user");


input.value="";



setTimeout(()=>{


let reply=jarvisReply(text);


addMessage(reply,"jarvis");


speak(reply);



},300);


}





// ENTER KEY


input.addEventListener(

"keydown",

function(event){


if(event.key==="Enter"){


sendMessage();


}


}

);



// START MESSAGE


addMessage(

"JARVIS V4 initialized. Systems online.",

"jarvis"

);
// ==================================================
// JARVIS V4 MODULE SYSTEM
// ==================================================


const JARVIS_CORE={

version:"V4.0",

status:"ONLINE",

modules:{},

stats:{

commands:0,

errors:0

}

};





// ===============================
// MODULE REGISTRATION
// ===============================


function registerModule(name,data){


JARVIS_CORE.modules[name]={

status:"ONLINE",

data:data

};


}





// ===============================
// SYSTEM STATUS
// ===============================


function getSystemStatus(){


let output=

`

JARVIS SYSTEM STATUS


Version:
${JARVIS_CORE.version}


Status:
${JARVIS_CORE.status}



Modules:

`;



for(let module in JARVIS_CORE.modules){


output+=

`${module}: ${JARVIS_CORE.modules[module].status}\n`;


}



output+=`

Commands:
${JARVIS_CORE.stats.commands}


Errors:
${JARVIS_CORE.stats.errors}

`;



return output;


}





// ===============================
// COMMAND ENGINE
// ===============================


function commandSystem(message){


const text=message.toLowerCase().trim();



if(
text==="status" ||
text==="system status"
){

return getSystemStatus();

}





if(text==="clear"){


chat.innerHTML="";


return "Chat cleared.";

}




if(text==="time"){


return "Current time: "+

new Date().toLocaleTimeString();


}





if(
text==="help" ||
text==="commands"
){


return `

Available commands:


status

clear

time

voice status

start listening

stop listening


`;

}



return null;


}





// ===============================
// OVERRIDE SEND SYSTEM
// ===============================


function sendMessage(){


let text=input.value.trim();


if(!text){

return;

}



addMessage(text,"user");


input.value="";



setTimeout(()=>{


let command=commandSystem(text);



if(command){


addMessage(command,"jarvis");


speak(command);


return;

}




let reply=jarvisReply(text);



addMessage(reply,"jarvis");


speak(reply);



},300);


}





// ===============================
// REGISTER CORE MODULES
// ===============================


registerModule(

"Memory",

memory

);


registerModule(

"Knowledge",

knowledge

);


registerModule(

"Core",

JARVIS_CORE

);
// ==================================================
// JARVIS V4 VOICE ENGINE
// ==================================================


const JARVIS_VOICE={

status:"OFFLINE",

supported:false,

listening:false,

recognition:null

};





// ===============================
// INITIALIZE VOICE
// ===============================


function initializeVoice(){


const SpeechRecognition =

window.SpeechRecognition ||

window.webkitSpeechRecognition;



if(!SpeechRecognition){


JARVIS_VOICE.status="NOT SUPPORTED";


return;

}



JARVIS_VOICE.supported=true;

JARVIS_VOICE.status="READY";




const recognition=new SpeechRecognition();



recognition.lang="en-US";


recognition.continuous=false;


recognition.interimResults=false;





recognition.onstart=function(){


JARVIS_VOICE.listening=true;


showVoiceOverlay();


updateVoiceText("Listening...");


};






recognition.onresult=function(event){


const text=

event.results[0][0].transcript;



addMessage(

text,

"user"

);



let response=

jarvisReply(text);



addMessage(

response,

"jarvis"

);



speak(response);



};






recognition.onerror=function(event){


updateVoiceText(

"Voice error: "+event.error

);


};



recognition.onend=function(){


JARVIS_VOICE.listening=false;


hideVoiceOverlay();


};




JARVIS_VOICE.recognition=recognition;


}





// ===============================
// START LISTENING
// ===============================


function startListening(){


if(!JARVIS_VOICE.supported){


addMessage(

"Voice recognition is not supported on this browser.",

"jarvis"

);


return;

}



try{


JARVIS_VOICE.recognition.start();


}

catch(error){


console.log(error);


}


}






// ===============================
// STOP LISTENING
// ===============================


function stopListening(){



if(JARVIS_VOICE.recognition){


JARVIS_VOICE.recognition.stop();


}


hideVoiceOverlay();


}






// ===============================
// TEXT TO SPEECH
// ===============================


function speak(text){


if(!window.speechSynthesis){

return;

}



speechSynthesis.cancel();



let voice=

new SpeechSynthesisUtterance(text);



voice.lang="en-US";


voice.rate=1;


voice.pitch=1;



speechSynthesis.speak(voice);



}






// ===============================
// VOICE STATUS COMMAND
// ===============================


function getVoiceStatus(){


return `

VOICE STATUS


Status:
${JARVIS_VOICE.status}


Supported:
${JARVIS_VOICE.supported}


Listening:
${JARVIS_VOICE.listening}

`;

}





// ===============================
// VOICE OVERLAY CONTROL
// ===============================


function showVoiceOverlay(){


const overlay=

document.getElementById("voiceOverlay");



if(overlay){

overlay.style.display="flex";

}


}





function hideVoiceOverlay(){


const overlay=

document.getElementById("voiceOverlay");



if(overlay){

overlay.style.display="none";

}


}





function updateVoiceText(text){


const subtitle=

document.getElementById("voiceSubtitle");



if(subtitle){

subtitle.textContent=text;

}


}





// ===============================
// STOP BUTTON
// ===============================


document

.getElementById("voiceStopButton")

.onclick=function(){


stopListening();


};






// START VOICE SYSTEM


initializeVoice();



registerModule(

"Voice",

JARVIS_VOICE

);



// ==================================================
// END VOICE ENGINE
// ==================================================
// ==================================================
// JARVIS V4 FINAL STARTUP
// ==================================================


function bootJarvis(){


console.log(

"JARVIS V4 ONLINE"

);



console.log(

JARVIS_CORE

);



addMessage(

"JARVIS V4 fully initialized.",

"jarvis"

);



addMessage(

"Voice, memory, commands, and intelligence systems ready.",

"jarvis"

);



}





bootJarvis();



// ===============================
// VOICE COMMAND SUPPORT
// ===============================


const oldCommandSystem = commandSystem;



commandSystem=function(message){


const text=message.toLowerCase().trim();



if(text==="voice status"){


return getVoiceStatus();

}




if(
text==="start listening" ||
text==="listen"
){


startListening();


return "Voice activated.";

}





if(
text==="stop listening" ||
text==="stop voice"
){


stopListening();


return "Voice stopped.";

}




return oldCommandSystem(message);


};



// ==================================================
// END JARVIS JAVASCRIPT
// ==================================================

</script>


</body>

</html>
