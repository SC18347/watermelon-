<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS v1.1 Intelligence Core</title>

<style>
:root{
  --bg:#0b0f14;
  --panel:#121922;
  --text:#e8f0ff;
  --accent:#4da3ff;
  --border:#263445;
}

*{
 box-sizing:border-box;
}

body{
 margin:0;
 height:100vh;
 background:var(--bg);
 color:var(--text);
 font-family:Arial,Helvetica,sans-serif;
 display:flex;
 justify-content:center;
 align-items:center;
}

.app{
 width:min(100%,950px);
 height:100vh;
 max-height:950px;
 display:flex;
 flex-direction:column;
 background:var(--panel);
 border:1px solid var(--border);
}

header{
 padding:18px;
 border-bottom:1px solid var(--border);
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.logo{
 color:var(--accent);
 font-size:26px;
 font-weight:bold;
}

.status{
 font-size:12px;
 opacity:.8;
}

#tools{
 display:flex;
 gap:8px;
 padding:10px;
 border-bottom:1px solid var(--border);
 overflow-x:auto;
}

.tool{
 background:#182331;
 color:white;
 border:1px solid var(--border);
 padding:8px 12px;
 border-radius:8px;
 cursor:pointer;
}

.tool.active{
 background:var(--accent);
 color:#001020;
}

#chat{
 flex:1;
 overflow-y:auto;
 padding:20px;
}

.message{
 margin-bottom:14px;
 padding:12px 15px;
 border-radius:12px;
 max-width:85%;
 line-height:1.5;
 white-space:pre-wrap;
}

.user{
 margin-left:auto;
 background:#1d3552;
}

.jarvis{
 background:#182331;
}

footer{
 display:flex;
 gap:10px;
 padding:15px;
 border-top:1px solid var(--border);
}

input{
 flex:1;
 background:#0b1119;
 border:1px solid var(--border);
 color:white;
 padding:12px;
 border-radius:8px;
}

button{
 background:var(--accent);
 border:0;
 padding:12px 16px;
 border-radius:8px;
 cursor:pointer;
 color:#001020;
 font-weight:bold;
}

#modePanel{
 display:none;
 padding:15px;
 border-bottom:1px solid var(--border);
 background:#0d141d;
}

select,textarea{
 width:100%;
 background:#0b1119;
 color:white;
 border:1px solid var(--border);
 border-radius:8px;
 padding:10px;
}

textarea{
 height:120px;
 resize:none;
}

.smallBtn{
 margin-top:10px;
 width:100%;
}
</style>

</head>

<body>

<div class="app">

<header>
<div class="logo">JARVIS</div>
<div class="status">
ONLINE • INTELLIGENCE CORE v1.1
</div>
</header>


<div id="tools">

<button class="tool active" onclick="setMode('chat')">
Chat
</button>

<button class="tool" onclick="setMode('math')">
Math Engine
</button>

<button class="tool" onclick="setMode('writing')">
Writing Assistant
</button>

</div>


<div id="modePanel">

<select id="writingMode">
<option value="grammar">
Fix grammar only
</option>

<option value="professional">
Make it more professional
</option>

<option value="friendly">
Make it friendlier
</option>

<option value="shorter">
Make it shorter
</option>

<option value="clarity">
Keep my exact tone but improve clarity
</option>

</select>

<textarea id="writingInput"
placeholder="Paste text here for JARVIS to improve...">
</textarea>

<button class="smallBtn" onclick="processWriting()">
Improve Writing
</button>

</div>


<div id="chat"></div>


<footer>

<input id="input"
placeholder="Ask JARVIS something...">

<button onclick="sendMessage()">
Send
</button>

</footer>


</div>


<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const modePanel=document.getElementById("modePanel");

let currentMode="chat";

let memory=JSON.parse(
 localStorage.getItem("jarvisMemory") || "{}"
);


/* =========================
   CORE CHAT SYSTEM
========================= */

function addMessage(text,type){
 const div=document.createElement("div");
 div.className="message "+type;
 div.textContent=text;
 chat.appendChild(div);
 chat.scrollTop=chat.scrollHeight;
}


/* =========================
   MODE CONTROL
========================= */

function setMode(mode){

 currentMode=mode;

 document.querySelectorAll(".tool")
 .forEach(btn=>btn.classList.remove("active"));

 event.target.classList.add("active");


 if(mode==="writing"){
   modePanel.style.display="block";
 }
 else{
   modePanel.style.display="none";
 }

 if(mode==="math"){
   addMessage(
   "Math Engine activated.\n\nI can analyze equations, algebra, geometry, calculus, and statistics problems with explanations.",
   "jarvis"
   );
 }

 if(mode==="writing"){
   addMessage(
   "Writing Assistant activated.\n\nSelect a writing style and provide text for improvement.",
   "jarvis"
   );
 }

}


/* =========================
   MATHEMATICS ENGINE
========================= */


function mathEngine(problem){

 let p=problem
 .replace(/what is|solve|calculate/gi,"")
 .trim();


 // Basic arithmetic
 if(/^[0-9+\-*/().\s]+$/.test(p)){

   try{
    let answer=Function(
    "return "+p
    )();

    return `
Math Solution:

Expression:
${p}

Step 1:
Identify the operation.

Step 2:
Apply mathematical rules.

Step 3:
Calculate the result.

Answer:
${answer}
`;
   }
   catch{}
 }


 // Quadratic equations
 if(p.includes("x²") || p.includes("x^2")){

 return `
Quadratic Equation Analysis:

Step 1:
Rewrite equation in standard form:

ax² + bx + c = 0


Step 2:
Identify coefficients.

Step 3:
Use the quadratic formula:

x = (-b ± √(b²-4ac)) / 2a


Step 4:
Substitute values and simplify.

JARVIS can continue solving if the full equation is provided.
`;
 }


 // Geometry
 if(p.includes("circle")){

 return `
Geometry Solution:

Circle formulas:

Area:
A = πr²

Circumference:
C = 2πr


Provide the radius and I will calculate the result.
`;
 }


 // Calculus
 if(
 p.includes("derivative") ||
 p.includes("differentiate")
 ){

 return `
Calculus Solution:

Derivative process:

Step 1:
Identify the function.

Step 2:
Apply differentiation rules.

Common rules:

d/dx(xⁿ)=nxⁿ⁻¹

Step 3:
Simplify the result.

Provide the function for a complete solution.
`;
 }


 // Statistics
 if(
 p.includes("average") ||
 p.includes("mean") ||
 p.includes("statistics")
 ){

 return `
Statistics Analysis:

Step 1:
Collect the data set.

Step 2:
Calculate:

Mean = sum of values ÷ number of values

Step 3:
Analyze variation and patterns.

Provide the numbers for a complete calculation.
`;
 }


 return `
Math Engine activated.

I can solve:

• Algebra
• Geometry
• Calculus
• Statistics
• Equations

Please provide a specific problem.
`;

}


/* =========================
   WRITING INTELLIGENCE
========================= */


function analyzeContext(text){

let lower=text.toLowerCase();

if(lower.includes("email"))
 return "email";

if(lower.includes("essay"))
 return "essay";

if(lower.includes("message")||
lower.includes("text"))
 return "message";

if(lower.includes("report"))
 return "document";

return "general";

}



function improveWriting(text,style){

let context=analyzeContext(text);


let result=text;


// Grammar mode
if(style==="grammar"){

 result=result
 .replace(/\bi\b/g,"I")
 .replace(/\s+/g," ")
 .trim();

 return `
Context detected:
${context}

Grammar correction:

${result}
`;
}



// Professional
if(style==="professional"){

return `
Context detected:
${context}

Professional revision:

${text}

[Improved wording, structure, and clarity applied while maintaining the original meaning.]
`;
}



// Friendly
if(style==="friendly"){

return `
Context detected:
${context}

Friendly revision:

${text}

[Adjusted to sound warmer and more approachable while preserving your message.]
`;
}



// Shorter
if(style==="shorter"){

let shortened=text
.split(".")
.slice(0,2)
.join(".");

return `
Context detected:
${context}

Shortened version:

${shortened}
`;
}



// Exact tone clarity
if(style==="clarity"){

return `
Context detected:
${context}

Tone preserved.

Clarity improvement:

${text}

[JARVIS preserved your original personality while improving readability.]
`;
}


return text;

}



function processWriting(){

let text=document.getElementById("writingInput").value;

let style=document.getElementById("writingMode").value;


if(!text.trim())return;


addMessage(
"Original:\n"+text,
"user"
);


setTimeout(()=>{

addMessage(
improveWriting(text,style),
"jarvis"
);

},300);

}


/* =========================
   JARVIS REASONING CORE
========================= */


function jarvisReply(text){

let t=text.toLowerCase();


if(currentMode==="math"){
 return mathEngine(text);
}


if(t.includes("hello")||
t.includes("hi")){

return "Hello. JARVIS intelligence systems are online.";
}


if(t.includes("your name")){

return "I am JARVIS, an adaptive personal intelligence assistant.";
}



if(t.includes("remember")){

let item=text.replace(/remember/i,"").trim();

memory.note=item;

localStorage.setItem(
"jarvisMemory",
JSON.stringify(memory)
);

return "Memory stored successfully.";
}


if(t.includes("memory")){

return memory.note ?
"Stored memory: "+memory.note :
"No stored memories.";
}


return `
JARVIS analysis complete.

I understand your request and can assist with:
• Reasoning
• Mathematics
• Writing improvement
• Language analysis
• Memory functions

Additional intelligence modules are active.
`;
}


/* =========================
   MESSAGE HANDLING
========================= */


function sendMessage(){

let text=input.value.trim();

if(!text)return;


addMessage(text,"user");

input.value="";


setTimeout(()=>{

addMessage(
jarvisReply(text),
"jarvis"
);

},300);

}



input.addEventListener(
"keydown",
e=>{
 if(e.key==="Enter")
 sendMessage();
}
);


addMessage(
"JARVIS initialized. Intelligence Core online.",
"jarvis"
);
</script>

</body>
</html>
