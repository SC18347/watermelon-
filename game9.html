<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS V4</title>

<style>

:root{
--bg:#080c12;
--panel:#121922;
--panel2:#182331;
--text:#e8f0ff;
--accent:#4da3ff;
--border:#263445;
}

*{
box-sizing:border-box;
}

body{

margin:0;
height:100vh;

background:var(--bg);
color:var(--text);

font-family:Arial,Helvetica,sans-serif;

display:flex;
justify-content:center;
align-items:center;

}


.app{

width:min(100%,1000px);
height:100vh;
max-height:950px;

background:var(--panel);

border:1px solid var(--border);

display:flex;
flex-direction:column;

}



header{

padding:18px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:1px solid var(--border);

}


.logo{

font-size:32px;
font-weight:bold;
color:var(--accent);

}


.status{

font-size:13px;

}



#tools{

display:flex;
gap:8px;

padding:10px;

overflow-x:auto;

border-bottom:1px solid var(--border);

}



.tool{

background:var(--panel2);

color:white;

border:1px solid var(--border);

padding:10px 14px;

border-radius:8px;

cursor:pointer;

}



.tool.active{

background:var(--accent);

color:#001020;

}



#panel{

display:none;

padding:15px;

border-bottom:1px solid var(--border);

}



input,
textarea,
select{

width:100%;

background:#0b1119;

color:white;

border:1px solid var(--border);

padding:12px;

border-radius:8px;

}



textarea{

height:120px;

}



#chat{

flex:1;

overflow-y:auto;

padding:20px;

}



.message{

max-width:85%;

padding:12px 15px;

border-radius:12px;

margin-bottom:12px;

white-space:pre-wrap;

line-height:1.5;

}



.user{

margin-left:auto;

background:#1d3552;

}



.jarvis{

background:#182331;

}



footer{

display:flex;

gap:10px;

padding:15px;

border-top:1px solid var(--border);

}



footer input{

flex:1;

}



button{

background:var(--accent);

color:#001020;

border:none;

padding:12px 16px;

border-radius:8px;

font-weight:bold;

cursor:pointer;

}


</style>

</head>


<body>


<div class="app">


<header>

<div class="logo">
JARVIS
</div>


<div class="status">
V4 CORE ONLINE
</div>

</header>


<div id="tools">


<button class="tool active" onclick="setMode('chat',this)">
Chat
</button>


<button class="tool" onclick="setMode('math',this)">
Math
</button>


<button class="tool" onclick="setMode('writing',this)">
Writing
</button>


<button class="tool" onclick="setExplanation('simple')">
Simple
</button>


<button class="tool" onclick="setExplanation('detailed')">
Detailed
</button>


<button class="tool" onclick="setExplanation('expert')">
Expert
</button>


</div>
<div id="panel">


<select id="writingMode">

<option value="grammar">
Fix Grammar
</option>

<option value="professional">
Professional
</option>

<option value="friendly">
Friendly
</option>

<option value="shorter">
Shorter
</option>

</select>


<br><br>


<textarea id="writingInput"
placeholder="Enter text to improve..."></textarea>


<br><br>


<button onclick="processWriting()">
Improve
</button>


</div>




<div id="chat"></div>




<footer>

<input id="input" placeholder="Ask JARVIS...">


<button onclick="sendMessage()">
Send
</button>

</footer>


</div>



<script>


// =====================================
// JARVIS V1 CORE VARIABLES
// =====================================


const chat =
document.getElementById("chat");


const input =
document.getElementById("input");


const panel =
document.getElementById("panel");



let currentMode="chat";


let explanationMode="normal";



// =====================================
// MESSAGE SYSTEM
// =====================================


function addMessage(text,type){


const div =
document.createElement("div");


div.className =
"message " + type;


div.textContent =
text;


chat.appendChild(div);


chat.scrollTop =
chat.scrollHeight;


}





// =====================================
// MODE SYSTEM
// =====================================


function setMode(mode,button){


currentMode=mode;



document
.querySelectorAll(".tool")
.forEach(btn=>{

btn.classList.remove("active");

});



if(button){

button.classList.add("active");

}



if(mode==="writing"){

panel.style.display="block";

}

else{

panel.style.display="none";

}



addMessage(

mode+" mode activated.",

"jarvis"

);


}





function setExplanation(mode){


explanationMode=mode;


addMessage(

"Explanation mode: "+mode,

"jarvis"

);


}





// =====================================
// V2 MEMORY SYSTEM
// =====================================


let memory = JSON.parse(

localStorage.getItem("jarvisMemory")

||

'{"notes":[]}'

);




function saveMemory(){


localStorage.setItem(

"jarvisMemory",

JSON.stringify(memory)

);


}



function remember(text){


memory.notes.push({

text:text,

date:new Date().toLocaleString()

});


saveMemory();


return "Memory saved.";

}




function readMemory(){


if(memory.notes.length===0){

return "No saved memories.";

}



return memory.notes.map(

(item,index)=>

(index+1)+". "+

item.text+

" ("+

item.date+

")"

).join("\n\n");


}





// =====================================
// V3 KNOWLEDGE DATABASE
// =====================================


const knowledge={


ai:
"Artificial intelligence allows computers to perform tasks that normally require human intelligence such as learning, reasoning, and recognizing patterns.",


computer:
"Computers use hardware and software to process information and perform tasks.",


car:
"Cars are machines designed for transportation using systems like engines, transmissions, brakes, and electronics.",


space:
"Space contains planets, stars, galaxies, and other objects beyond Earth's atmosphere.",


engine:
"An engine converts energy into mechanical motion.",


money:
"Money systems involve earning, saving, spending, and investing."

};





// =====================================
// EXPLANATION ENGINE
// =====================================


function explain(text){


if(explanationMode==="simple"){

return "Simple explanation:\n\n"+text;

}


if(explanationMode==="detailed"){

return "Detailed explanation:\n\n"+text+
"\n\nAdditional examples can be provided.";

}



if(explanationMode==="expert"){

return "Expert explanation:\n\n"+text+
"\n\nThis focuses on deeper technical concepts.";

}



return text;


}
 
// =====================================
// V3 CONTEXT SYSTEM
// =====================================


let context={

topic:null,

lastAnswer:null

};




function updateContext(topic,answer){


context.topic=topic;

context.lastAnswer=answer;


}





function resolveContext(message){


if(!context.topic){

return null;

}



const words=[

"more",
"why",
"how",
"explain",
"continue",
"that",
"it"

];



let text=message.toLowerCase();



if(words.some(word=>text.includes(word))){


return context.lastAnswer;


}



return null;


}





// =====================================
// V3 INTENT DETECTION
// =====================================


function detectIntent(message){


let text=message.toLowerCase();



if(

text.includes("what is") ||

text.includes("explain") ||

text.includes("tell me")

){

return "knowledge";

}




if(

text.includes("how do i") ||

text.includes("how can i")

){

return "problem";

}





if(

text.includes("remember")

){

return "memory";

}




if(

text.includes("time")

){

return "time";

}



return "unknown";


}





// =====================================
// V3 REASONING ENGINE
// =====================================


function reasoningEngine(message){


let intent =
detectIntent(message);



if(intent==="problem"){


return `

I can help solve that.

I need:

• Your goal
• The problem
• Any limits or requirements

`;

}



if(intent==="time"){


return "Current time: "+
new Date().toLocaleTimeString();


}



return null;


}





// =====================================
// SMART KNOWLEDGE SEARCH
// =====================================


function searchKnowledge(message){


let text =
message.toLowerCase();



for(let item in knowledge){


if(text.includes(item)){


updateContext(

item,

knowledge[item]

);



return explain(

knowledge[item]

);


}


}



return null;


}





// =====================================
// MAIN INTELLIGENCE ROUTER
// =====================================


function jarvisReply(message){



// Context check

let contextAnswer =
resolveContext(message);



if(contextAnswer){


return explain(contextAnswer);


}




// Reasoning

let reasoning =
reasoningEngine(message);



if(reasoning){

return reasoning;

}





// Memory commands

let text =
message.toLowerCase();



if(text.startsWith("remember")){


return remember(

message.replace(

/remember/i,

""

).trim()

);


}



if(text.includes("memory")){


return readMemory();

}




// Knowledge

let answer =
searchKnowledge(message);



if(answer){

return answer;

}





// Personality responses


if(

text.includes("hello") ||

text.includes("hi") ||

text.includes("hey")

){

return "Hello. JARVIS systems are online.";

}





if(text.includes("your name")){

return "I am JARVIS, your personal intelligence assistant.";

}





return conversationalFallback(message);

}
 // =====================================
// NATURAL CONVERSATION FALLBACK
// =====================================

function conversationalFallback(message){

let responses = [

"I can help with that. Tell me a little more about what you mean.",

"Interesting. Can you give me more details so I can answer better?",

"I understand the question. Let me think through it with you.",

"That is a good topic. What part would you like to explore?",

"I can help you work through that. What are you trying to accomplish?"

];


let index = Math.floor(

Math.random() * responses.length

);


return responses[index];

}
// =====================================
// V4 MATH APPLICATION
// =====================================


function mathEngine(problem){


let equation = problem

.replace(/calculate|solve|what is/gi,"")

.trim();



if(

/^[0-9+\-*/().\s]+$/.test(equation)

){


try{


let result = Function(

"return " + equation

)();



return `

Math Solution:

Problem:
${equation}

Answer:
${result}

`;



}

catch(error){


return "I could not solve that equation.";

}



}



return `

Math mode active.

I can solve:

• Addition
• Subtraction
• Multiplication
• Division
• Basic equations

`;

}





// =====================================
// V4 WRITING APPLICATION
// =====================================


function processWriting(){



let text =

document.getElementById(

"writingInput"

).value;



let mode =

document.getElementById(

"writingMode"

).value;




if(!text.trim()){

return;

}





let result=text;




if(mode==="grammar"){


result = text.replace(

/\bi\b/g,

"I"

);



}



if(mode==="professional"){


result =

"Professional version:\n\n"+text;


}





if(mode==="friendly"){


result =

"Friendly version:\n\n"+text;


}





if(mode==="shorter"){


result =

text

.split(".")

.slice(0,2)

.join(".")+".";


}





addMessage(

result,

"jarvis"

);


}







// =====================================
// APPLICATION ROUTER
// =====================================


function applicationRouter(message){


if(currentMode==="math"){


return mathEngine(message);


}



return null;


}
// =====================================
// V4 CALENDAR APPLICATION
// =====================================


let calendar = JSON.parse(

localStorage.getItem("jarvisCalendar")

||

"[]"

);





function saveCalendar(){


localStorage.setItem(

"jarvisCalendar",

JSON.stringify(calendar)

);


}




function addEvent(name){


calendar.push({

name:name,

date:new Date().toLocaleString()

});


saveCalendar();



return "Calendar event added: "+name;


}





function showCalendar(){


if(calendar.length===0){

return "Calendar is empty.";

}



return calendar.map(

(event,index)=>

(index+1)+". "+

event.name+

" - "+

event.date

).join("\n\n");


}






function calendarSystem(message){


let text=

message.toLowerCase();





if(

text.includes("add") &&

text.includes("event")

){



let name =

message

.replace(/add|event/gi,"")

.trim();



return addEvent(name);


}





if(

text.includes("calendar") ||

text.includes("schedule")

){


return showCalendar();


}



return null;


}





// =====================================
// V4 CORE ENGINE
// =====================================


const JARVIS_CORE={


version:"V4.0",

status:"ONLINE",


modules:{},


stats:{


commands:0,

errors:0


}


};





function registerModule(name,module){


JARVIS_CORE.modules[name]={


status:"ONLINE",

module:module


};



}





function getSystemStatus(){



let output=

`

JARVIS SYSTEM STATUS


Version:
${JARVIS_CORE.version}


Status:
${JARVIS_CORE.status}


Modules:

`;





for(let module in JARVIS_CORE.modules){


output +=

module+

": ONLINE\n";


}





output +=`

Commands:
${JARVIS_CORE.stats.commands}


Errors:
${JARVIS_CORE.stats.errors}

`;



return output;


}





// Register systems


registerModule(

"Knowledge",

knowledge

);



registerModule(

"Memory",

memory

);



registerModule(

"Calendar",

calendar

);



registerModule(

"Core",

JARVIS_CORE

);
// =====================================
// FINAL RESPONSE ROUTER
// =====================================


const baseJarvisReply = jarvisReply;



jarvisReply=function(message){



// Applications

let appReply =

applicationRouter(message);



if(appReply){

return appReply;

}





// Calendar

let calendarReply =

calendarSystem(message);



if(calendarReply){

return calendarReply;

}





// Status commands

let text =

message.toLowerCase();




if(

text==="status" ||

text==="system status"

){


return getSystemStatus();


}





return baseJarvisReply(message);



};






// =====================================
// SEND MESSAGE SYSTEM
// =====================================


function sendMessage(){


const userInput =

document.getElementById(

"input"

);



const text =

userInput.value.trim();





if(!text){

return;

}




addMessage(

text,

"user"

);



userInput.value="";





setTimeout(()=>{



const response =

jarvisReply(text);



addMessage(

response,

"jarvis"

);



},300);



}








// =====================================
// ENTER KEY SUPPORT
// =====================================


input.addEventListener(

"keydown",

function(event){



if(event.key==="Enter"){


sendMessage();


}



}

);






// =====================================
// STARTUP MESSAGE
// =====================================


function bootJarvis(){



addMessage(

"JARVIS V4 initialized.",

"jarvis"

);



addMessage(

"Memory, intelligence, and applications online.",

"jarvis"

);



}




bootJarvis();
// =====================================
// TOOL BUTTON SYSTEM
// =====================================


function connectToolButtons(){


const buttons =

document.querySelectorAll(".tool");



buttons.forEach(button=>{


button.addEventListener(

"click",

function(){



buttons.forEach(btn=>{

btn.classList.remove("active");

});



button.classList.add("active");



}

);


});


}







// =====================================
// WRITING PANEL CONTROL FIX
// =====================================


function updatePanel(){


if(currentMode==="writing"){


panel.style.display="block";


}

else{


panel.style.display="none";


}



}






// Replace mode function with connected version


const oldSetMode = setMode;



setMode=function(mode,button){



currentMode=mode;



document

.querySelectorAll(".tool")

.forEach(btn=>{


btn.classList.remove("active");


});





if(button){

button.classList.add("active");

}




updatePanel();



addMessage(

mode+" mode activated.",

"jarvis"

);


};








// =====================================
// START INTERFACE
// =====================================


connectToolButtons();

updatePanel();
// =====================================
// FINAL STARTUP CHECK
// =====================================


console.log(

"JARVIS V4 CORE ONLINE"

);


console.log(

JARVIS_CORE

);




// =====================================
// ERROR PROTECTION
// =====================================


window.onerror=function(message){


console.log(

"JARVIS ERROR:",

message

);


};



// =====================================
// END OF JAVASCRIPT
// =====================================


</script>


</body>

</html>
