// =====================================
// JARVIS V4
// MEMORY SYSTEM
// =====================================

let memory = JSON.parse(

localStorage.getItem("jarvisMemory")

||

'{"notes":[]}'

);


// Save memory to browser

function saveMemory(){

localStorage.setItem(

"jarvisMemory",

JSON.stringify(memory)

);

}


// Remember something

function remember(text){

if(!text.trim()){

return "Tell me what you would like me to remember.";

}

memory.notes.push({

text:text,

time:new Date().toLocaleString()

});

saveMemory();

return "I'll remember that.";

}


// Show memory

function readMemory(){

if(memory.notes.length===0){

return "I don't have any saved memories yet.";

}

let output="Saved Memories\n\n";

memory.notes.forEach((note,index)=>{

output +=

`${index+1}. ${note.text}\n`;

});

return output;

}


// Forget everything

function clearMemory(){

memory.notes=[];

saveMemory();

return "All saved memories have been cleared.";

}


// Memory command handler

function memoryRouter(message){

let text=message.toLowerCase();


if(text.startsWith("remember ")){

return remember(

message.substring(9).trim()

);

}


if(

text==="memory" ||

text==="show memory"

){

return readMemory();

}


if(

text==="clear memory" ||

text==="forget everything"

){

return clearMemory();

}


return null;

}




// =====================================
// JARVIS ADVANCED CALENDAR SYSTEM V2
// =====================================

const CalendarSystem = {

    version:"2.0",

    calendars:{
        personal:[],
        work:[],
        school:[],
        reminders:[]
    },


    init(){

        let saved =
        localStorage.getItem("jarvisCalendar");

        if(saved){

            this.calendars =
            JSON.parse(saved);

        }

    },


    save(){

        localStorage.setItem(
            "jarvisCalendar",
            JSON.stringify(this.calendars)
        );

    },


    createEvent({

        calendar="personal",
        title,
        description="",
        date,
        startTime="",
        endTime="",
        location="",
        category="general",
        reminder=null,
        repeat="none"

    }){


        let event={

            id:Date.now(),

            title,

            description,

            date,

            startTime,

            endTime,

            location,

            category,

            reminder,

            repeat,

            created:
            new Date().toISOString()

        };


        if(!this.calendars[calendar]){

            this.calendars[calendar]=[];

        }


        this.calendars[calendar].push(event);


        this.save();


        return `Event created: ${title}`;

    },



// =====================================
// GET ALL EVENTS
// =====================================

    getAllEvents(){


        let events=[];


        Object.values(this.calendars)
        .forEach(calendar=>{

            events.push(...calendar);

        });


        return events.sort(
            (a,b)=>
            new Date(a.date)-new Date(b.date)
        );

    },



// =====================================
// TODAY AGENDA
// =====================================

    today(){


        let today =
        new Date()
        .toLocaleDateString();


        let events =
        this.getAllEvents()
        .filter(e=>e.date===today);



        if(events.length===0){

            return "No events today.";

        }


        return this.format(events);

    },



// =====================================
// UPCOMING EVENTS
// =====================================

    upcoming(days=7){


        let now =
        new Date();


        let future =
        new Date();


        future.setDate(
            now.getDate()+days
        );


        let events =
        this.getAllEvents()
        .filter(event=>{

            let date =
            new Date(event.date);

            return date>=now &&
                   date<=future;

        });


        if(events.length===0){

            return "No upcoming events.";

        }


        return this.format(events);

    },



// =====================================
// SEARCH
// =====================================

    search(query){


        query=query.toLowerCase();


        let results =
        this.getAllEvents()
        .filter(event=>

            event.title
            .toLowerCase()
            .includes(query)

            ||

            event.description
            .toLowerCase()
            .includes(query)

        );


        return this.format(results);

    },



// =====================================
// DELETE EVENT
// =====================================

    delete(id){


        for(let calendar in this.calendars){


            this.calendars[calendar] =

            this.calendars[calendar]
            .filter(event=>event.id!==id);


        }


        this.save();


        return "Event deleted.";

    },



// =====================================
// CLEAR CALENDAR
// =====================================

    clear(){


        this.calendars={

            personal:[],
            work:[],
            school:[],
            reminders:[]

        };


        this.save();


        return "Calendar cleared.";

    },



// =====================================
// FORMAT OUTPUT
// =====================================

    format(events){


        return events.map(event=>`

📅 ${event.title}

Date:
${event.date}

Time:
${event.startTime}
${event.endTime ? "- "+event.endTime:""}

Location:
${event.location || "None"}

Category:
${event.category}

Reminder:
${event.reminder || "None"}

        `).join("\n----------------\n");

    },



// =====================================
// SYSTEM CHECK
// =====================================

    status(){

        let total =
        this.getAllEvents().length;


        return {

            system:"Calendar",

            status:"Online",

            eventsStored:total,

            calendars:
            Object.keys(this.calendars)

        };

    }

};

                                    data.answer,

                                    score:score,

                                    related:
                                    data.related || []


                                });


                            }


                        }


                    }


                }



                this.scan(

                    item,

                    query,

                    matches

                );

            }

        }

    },



// =====================================
// RESPONSE BUILDER
// =====================================

    buildResponse(result){


        let response = {


            answer:
            result.answer,


            information:{

                topic:
                result.topic,


                category:
                result.category,


                confidence:
                this.confidence+"%"

            },


            relatedTopics:
            result.related


        };


        return response;

    },



// =====================================
// SEARCH SUGGESTIONS
// =====================================

    suggestions(){


        if(!this.lastResult){

            return [];

        }


        return this.lastResult.related || [];

    },



// =====================================
// DIAGNOSTICS
// =====================================

    statusReport(){


        return {


            name:
            "Knowledge Engine",


            version:
            this.version,


            status:
            this.status,


            searches:
            this.searchHistory.length,


            confidence:
            this.confidence+"%"


        };

    }

};
// =====================================
// JARVIS REASONING ENGINE V2
// =====================================

const ReasoningEngine = {

    status:"online",

    version:"2.0",

    context:[],

    lastAnalysis:null,



// =====================================
// MAIN REASONING PROCESS
// =====================================

    think(question, knowledge=null){


        let analysis={


            input:question,


            intent:
            this.detectIntent(question),


            context:
            this.getContext(),


            knowledge:


            knowledge,


            reasoningSteps:[],


            confidence:0,


            answer:null


        };



        analysis.reasoningSteps.push(
            "Question received and analyzed"
        );



        if(knowledge){


            analysis.reasoningSteps.push(
                "Relevant knowledge connected"
            );


            analysis.confidence +=50;


        }



        analysis.reasoningSteps.push(

            "Intent classified as: "
            + analysis.intent

        );



        analysis.answer =

        this.generateAnswer(

            analysis

        );



        analysis.confidence +=

        this.evaluateConfidence(

            analysis

        );



        this.lastAnalysis=analysis;



        this.context.push({

            question:question,

            answer:analysis.answer

        });



        return analysis.answer;

    },



// =====================================
// INTENT DETECTION
// =====================================

    detectIntent(question){


        let text =
        question.toLowerCase();



        if(
            text.includes("why")
        ){

            return "explanation";

        }



        if(
            text.includes("how")
        ){

            return "instruction";

        }



        if(
            text.includes("difference")
            ||
            text.includes("compare")
        ){

            return "comparison";

        }



        if(
            text.includes("solve")
            ||
            text.includes("calculate")
        ){

            return "problem solving";

        }



        if(
            text.includes("what")
            ||
            text.includes("define")
        ){

            return "definition";

        }



        return "conversation";

    },



// =====================================
// ANSWER GENERATOR
// =====================================

    generateAnswer(data){



        let knowledge=data.knowledge;



        if(!knowledge){


            return {

                message:
                "I need more information to answer accurately.",


                reasoning:
                "No matching knowledge source was found."

            };

        }



        let answer={


            response:
            knowledge.answer,


            explanation:
            this.expandExplanation(

                knowledge.answer,

                data.intent

            ),


            reasoning:
            data.reasoningSteps,


            confidence:
            data.confidence+"%"


        };



        return answer;

    },



// =====================================
// EXPLANATION EXPANDER
// =====================================

    expandExplanation(answer,intent){


        if(intent==="explanation"){

            return "JARVIS will explain the causes and principles behind: "
            + answer;

        }



        if(intent==="instruction"){

            return "JARVIS will organize this into a step-by-step process.";

        }



        if(intent==="comparison"){

            return "JARVIS will analyze similarities and differences.";

        }



        return "JARVIS organized the information into a clear response.";

    },



// =====================================
// CONFIDENCE ANALYSIS
// =====================================

    evaluateConfidence(data){


        let score=0;



        if(data.knowledge){

            score+=30;

        }



        if(data.context.length>0){

            score+=10;

        }



        return score;

    },



// =====================================
// CONTEXT MEMORY
// =====================================

    getContext(){


        return this.context.slice(-5);

    },



// =====================================
// SOLUTION PLANNER
// =====================================

    solve(problem){


        return {


            problem:problem,


            plan:[

                "Analyze the problem",

                "Identify known information",

                "Determine possible methods",

                "Apply solution",

                "Verify result"

            ]

        };

    },



// =====================================
// COMPARISON TOOL
// =====================================

    compare(first,second){


        return {


            compared:[

                first,

                second

            ],


            method:

            [

                "Find similarities",

                "Find differences",

                "Evaluate importance"

            ]

        };

    },



// =====================================
// SYSTEM CHECK
// =====================================

    statusReport(){


        return {

            name:
            "Reasoning Engine",

            version:
            this.version,

            status:
            this.status,

            contextSize:
            this.context.length,

            lastAnalysis:
            this.lastAnalysis

        };

    }

};
// =====================================
// JARVIS PERSONALITY ENGINE V2
// =====================================

const PersonalityEngine = {

    status:"online",

    version:"2.0",

    currentStyle:"natural",

    responseLength:"balanced",

    context:"normal",


    traits:{

        helpful:true,

        respectful:true,

        clear:true,

        adaptive:true,

        conversational:true,

        patient:true

    },



// =====================================
// MAIN RESPONSE BUILDER
// =====================================

    respond(inputData){


        if(!inputData){

            return "I need more information to respond.";

        }


        let response = {


            message:
            this.createMessage(inputData),


            style:
            this.currentStyle,


            length:
            this.responseLength,


            generatedBy:
            "Personality Engine"

        };


        return response;

    },



// =====================================
// MESSAGE CREATION
// =====================================

    createMessage(data){


        let content="";


        if(typeof data==="string"){

            content=data;

        }

        else if(data.response){

            content=data.response;

        }

        else if(data.answer){

            content=data.answer;

        }

        else if(data.message){

            content=data.message;

        }

        else{

            content=
            JSON.stringify(data);

        }



        return this.applyStyle(content);

    },



// =====================================
// STYLE PROCESSING
// =====================================

    applyStyle(message){


        switch(this.currentStyle){


            case "professional":

                return message;


            case "teacher":

                return (

                "Explanation:\n\n"
                + message

                );


            case "technical":

                return (

                "Technical Analysis:\n\n"
                + message

                );


            case "casual":

                return message;


            default:

                return message;


        }

    },



// =====================================
// STYLE CONTROL
// =====================================

    setStyle(style){


        const styles=[

            "natural",

            "professional",

            "teacher",

            "technical",

            "casual"

        ];



        if(styles.includes(style)){


            this.currentStyle=style;


            return "Style set to "
            + style;

        }


        return "Unknown style.";

    },



// =====================================
// RESPONSE LENGTH
// =====================================

    setLength(length){


        const options=[

            "short",

            "balanced",

            "detailed"

        ];



        if(options.includes(length)){


            this.responseLength=length;


            return "Response length set.";

        }


        return "Invalid length.";

    },



// =====================================
// CONTEXT ADAPTATION
// =====================================

    setContext(context){


        this.context=context;


        return "Context updated.";

    },



// =====================================
// CONVERSATION AWARENESS
// =====================================

    understandContext(history){


        if(!history || history.length===0){

            return "No previous context.";

        }


        return {

            previousMessages:
            history.slice(-5),

            continuity:
            true

        };

    },



// =====================================
// RESPONSE ADAPTATION
// =====================================

    adapt(){

        return {

            style:
            this.currentStyle,

            length:
            this.responseLength,

            context:
            this.context

        };

    },



// =====================================
// DIAGNOSTICS
// =====================================

    statusReport(){


        return {

            name:
            "Personality Engine",

            version:
            this.version,

            status:
            this.status,

            style:
            this.currentStyle,

            length:
            this.responseLength,

            traits:
            this.traits

        };

    }

};
// =====================================
// JARVIS INTELLIGENCE CENTER V2
// =====================================

const IntelligenceCenter = {

    status:"online",

    version:"2.0",

    lastRequest:null,

    history:[],

    confidence:0,


    connectedEngines:{

        memory:"online",

        calendar:"online",

        knowledge:"online",

        reasoning:"online",

        personality:"online",

        explanation:"online"

    },



// =====================================
// MAIN BRAIN PROCESS
// =====================================

    process(input){


        try{


            this.lastRequest=input;


            let request={


                input:input,


                intent:
                this.detectIntent(input),


                priority:
                this.assignPriority(input),


                results:[]

            };



            this.history.push(request);



            // 1. Handle direct commands

            let command =
            this.commandRouter(request);



            if(command){

                return this.format(command);

            }



            // 2. Check memory

            let memory =
            this.memoryRoute(input);



            if(memory){

                request.results.push({

                    source:"memory",

                    data:memory

                });

            }



            // 3. Search knowledge

            let knowledge =
            KnowledgeEngine.ask(input);



            if(knowledge){

                request.results.push({

                    source:"knowledge",

                    data:knowledge

                });


            }



            // 4. Apply reasoning

            let reasoning =
            ReasoningEngine.think(

                input,

                knowledge

            );



            request.results.push({

                source:"reasoning",

                data:reasoning

            });



            // 5. Create final response

            let final =

            PersonalityEngine.respond(

                reasoning

            );



            return this.format(final);



        }

        catch(error){


            return {

                error:

                "Intelligence Center error",

                details:error.message

            };


        }


    },



// =====================================
// INTENT ANALYSIS
// =====================================

    detectIntent(text){


        let input =
        text.toLowerCase();



        if(
            input.includes("schedule")
            ||
            input.includes("calendar")
        ){

            return "planning";

        }



        if(
            input.includes("explain")
            ||
            input.includes("why")
        ){

            return "learning";

        }



        if(
            input.includes("solve")
            ||
            input.includes("calculate")
        ){

            return "problem solving";

        }



        if(
            input.includes("remember")
        ){

            return "memory";

        }



        return "conversation";


    },



// =====================================
// PRIORITY SYSTEM
// =====================================

    assignPriority(input){


        let text =
        input.toLowerCase();



        if(
            text.includes("urgent")
        ){

            return "high";

        }


        if(
            text.includes("help")
        ){

            return "medium";

        }


        return "normal";


    },



// =====================================
// COMMAND ROUTER
// =====================================

    commandRouter(request){


        let text =
        request.input.toLowerCase();



        if(
            text.includes("system status")
        ){

            return this.statusReport();

        }



        if(
            text.includes("calendar")
            &&
            typeof CalendarSystem !== "undefined"
        ){

            return CalendarSystem.upcoming();

        }



        return null;

    },



// =====================================
// MEMORY ROUTER
// =====================================

    memoryRoute(input){


        if(
            typeof MemoryCenter !== "undefined"
        ){

            return MemoryCenter.search(input);

        }


        return null;

    },



// =====================================
// RESPONSE FORMATTER
// =====================================

    format(response){


        if(
            typeof response === "object"
        ){

            if(response.message){

                return response.message;

            }


            if(response.response){

                return response.response;

            }

        }



        return response;

    },



// =====================================
// DIAGNOSTICS
// =====================================

    statusReport(){


        return {


            name:
            "Intelligence Center",


            version:
            this.version,


            status:
            this.status,


            engines:
            this.connectedEngines,


            requests:
            this.history.length


        };

    }

};
// =====================================
// JARVIS DIAGNOSTIC CENTER V2
// =====================================

const DiagnosticCenter = {

    version:"2.0",

    status:"online",

    reports:[],

    modules:{},



// =====================================
// FULL SYSTEM SCAN
// =====================================

    scan(){


        let report={


            id:
            Date.now(),


            time:
            new Date()
            .toLocaleString(),


            overall:
            "ONLINE",


            modules:{},


            warnings:[],


            errors:[]

        };



        const checks=[


            ["Core Variables","CoreVariables"],

            ["Memory Center","MemoryCenter"],

            ["Calendar Center","CalendarSystem"],

            ["Mode Center","ModeCenter"],

            ["Explanation Engine","ExplanationEngine"],

            ["Knowledge Database","KnowledgeDatabase"],

            ["Knowledge Engine","KnowledgeEngine"],

            ["Reasoning Engine","ReasoningEngine"],

            ["Personality Engine","PersonalityEngine"],

            ["Intelligence Center","IntelligenceCenter"],

            ["Message System","MessageSystem"]


        ];



        checks.forEach(module=>{


            let result =
            this.checkModule(
                module[0],
                module[1]
            );


            report.modules[module[0]]=result;



            if(result.status==="OFFLINE"){

                report.warnings.push(
                    module[0]+" unavailable"
                );

            }


        });



        if(report.warnings.length>0){

            report.overall="WARNING";

        }



        this.reports.push(report);


        return report;

    },



// =====================================
// MODULE CHECK
// =====================================

    checkModule(name,reference){


        let online=false;



        try{


            online =
            typeof window !== "undefined"
            &&
            eval(
            "typeof "+reference+
            " !== 'undefined'"
            );


        }

        catch(error){


            return {

                status:"ERROR",

                message:
                error.message

            };

        }



        return {


            name:name,


            status:
            online
            ?
            "ONLINE"
            :
            "OFFLINE"


        };

    },



// =====================================
// HEALTH SCORE
// =====================================

    healthScore(){


        let latest =
        this.reports[
            this.reports.length-1
        ];



        if(!latest){

            return 0;

        }



        let total =
        Object.keys(
        latest.modules
        ).length;


        let online =
        Object.values(
        latest.modules
        )
        .filter(
        m=>m.status==="ONLINE"
        )
        .length;



        return Math.round(
            (online/total)*100
        );

    },



// =====================================
// UPDATE REPORT
// =====================================

    systemUpdate(){


        let report =
        this.scan();



        return {


            title:
            "JARVIS System Update",


            status:
            report.overall,


            health:
            this.healthScore()+"%",


            modules:
            report.modules,


            warnings:
            report.warnings


        };

    },



// =====================================
// ERROR REPORTING
// =====================================

    reportError(error){


        return {


            type:"ERROR",


            message:
            error.message,


            time:
            new Date()

        };

    },



// =====================================
// STATUS
// =====================================

    statusReport(){


        return {


            name:
            "Diagnostic Center",


            version:
            this.version,


            status:
            this.status,


            scans:
            this.reports.length,


            health:
            this.healthScore()+"%"

        };

    }

};
// =====================================
// JARVIS MESSAGE SYSTEM V2
// =====================================

const MessageSystem = {

    version:"2.0",

    status:"online",

    history:[],


    settings:{

        timestamps:true,

        saveHistory:true,

        maxHistory:100

    },



// =====================================
// SEND MESSAGE
// =====================================

    send(input){


        if(!input || input.trim()===""){

            return;

        }



        let userMessage={


            id:
            Date.now(),


            sender:
            "user",


            text:
            input,


            time:
            new Date()

        };



        this.addMessage(
            userMessage
        );



        let response;



        try{


            response =
            IntelligenceCenter.process(
                input
            );


        }

        catch(error){


            DiagnosticCenter.reportError(
                error
            );


            response={

                message:
                "JARVIS encountered an error."

            };


        }



        let jarvisMessage={


            id:
            Date.now()+1,


            sender:
            "jarvis",


            text:
            this.extractResponse(response),


            time:
            new Date()

        };



        this.addMessage(
            jarvisMessage
        );



        return jarvisMessage;

    },



// =====================================
// MESSAGE STORAGE
// =====================================

    addMessage(message){


        this.history.push(
            message
        );



        if(
            this.history.length >
            this.settings.maxHistory
        ){

            this.history.shift();

        }



        if(this.settings.saveHistory){


            localStorage.setItem(

                "jarvisMessages",

                JSON.stringify(
                    this.history
                )

            );

        }


    },



// =====================================
// LOAD HISTORY
// =====================================

    load(){


        let saved =
        localStorage.getItem(
            "jarvisMessages"
        );



        if(saved){


            this.history =
            JSON.parse(saved);

        }


    },



// =====================================
// RESPONSE CLEANER
// =====================================

    extractResponse(response){


        if(typeof response==="string"){

            return response;

        }



        if(response.message){

            return response.message;

        }



        if(response.response){

            return response.response;

        }



        if(response.answer){

            return response.answer;

        }



        return JSON.stringify(response);

    },



// =====================================
// GET CHAT HISTORY
// =====================================

    getHistory(){

        return this.history;

    },



// =====================================
// CLEAR CHAT
// =====================================

    clear(){


        this.history=[];


        localStorage.removeItem(
            "jarvisMessages"
        );


        return "Conversation cleared.";

    },



// =====================================
// STATUS
// =====================================

    statusReport(){


        return {


            name:
            "Message System",


            version:
            this.version,


            status:
            this.status,


            messages:
            this.history.length


        };

    }

};



MessageSystem.load();

// =====================================

// =====================================
// MODE BUTTONS
// =====================================

function setMode(mode, button){


    document
    .querySelectorAll(".tool")
    .forEach(btn=>{

        btn.classList.remove("active");

    });



    if(button){

        button.classList.add("active");

    }



    if(typeof ModeSystem !== "undefined"){

        if(typeof ModeSystem.setMode === "function"){

            ModeSystem.setMode(mode);

        }

    }



    addMessage(
        "Mode changed to: " + mode,
        "jarvis"
    );


}



// =====================================
// EXPLANATION BUTTONS
// =====================================

function setExplanation(level){


    if(typeof ExplanationEngine !== "undefined"){

        if(typeof ExplanationEngine.setMode === "function"){

            ExplanationEngine.setMode(level);

        }

    }



    addMessage(
        "Explanation level: " + level,
        "jarvis"
    );


}



// =====================================
// CALENDAR BUTTON
// =====================================

function showCalendar(){


    if(typeof CalendarSystem !== "undefined"){

            return CalendarSystem.upcoming();


        }


    }


    return "Calendar system is offline.";

}



// =====================================
// WRITING BUTTON
// =====================================

function processWriting(){


    const input =
    document.getElementById(
        "writingInput"
    );



    const mode =
    document.getElementById(
        "writingMode"
    );



    if(!input || input.value.trim()===""){


        addMessage(
            "Enter text first.",
            "jarvis"
        );


        return;


    }



    let request={


        type:"writing",

        mode:
        mode ? mode.value : "normal",

        text:
        input.value


    };



    if(typeof IntelligenceCenter !== "undefined"){


        let response =
        IntelligenceCenter.process(
            JSON.stringify(request)
        );


        addMessage(
            response,
            "jarvis"
        );


    }



}



// =====================================
// CHAT MESSAGE DISPLAY
// =====================================

function addMessage(text, sender){


    const chat =
    document.getElementById(
        "chatWindow"
    );



    if(!chat){

        console.log(sender,text);

        return;

    }



    let message =
    document.createElement("div");



    message.className =
    sender;



    message.innerText =
    typeof text === "object"
    ?
    JSON.stringify(text)
    :
    text;



    chat.appendChild(message);



    chat.scrollTop =
    chat.scrollHeight;


}

// JARVIS STARTUP FUNCTIONS V1

const StartupFunctions = {

    version:"1.0",

    status:"offline",

    startTime:null,

    modulesLoaded:[],



// =====================================
// START JARVIS
// =====================================

    initialize(){


        this.startTime =
        new Date();

        this.loadModules();

// =====================================
