<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS v1.0</title>
<style>
:root{
  --bg:#0b0f14;
  --panel:#121922;
  --text:#e8f0ff;
  --accent:#4da3ff;
  --border:#263445;
}
*{box-sizing:border-box}
body{
  margin:0;
  height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}
.app{
  width:min(100%,900px);
  height:100vh;
  max-height:900px;
  display:flex;
  flex-direction:column;
  background:var(--panel);
  border:1px solid var(--border);
}
header{
  padding:18px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  color:var(--accent);
  font-size:24px;
  font-weight:bold;
}
.status{
  font-size:12px;
  opacity:.8;
}
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}
.message{
  margin-bottom:14px;
  padding:12px 15px;
  border-radius:12px;
  max-width:80%;
  line-height:1.4;
}
.user{
  margin-left:auto;
  background:#1d3552;
}
.jarvis{
  background:#182331;
}
footer{
  display:flex;
  gap:10px;
  padding:15px;
  border-top:1px solid var(--border);
}
input{
  flex:1;
  background:#0b1119;
  border:1px solid var(--border);
  color:white;
  padding:12px;
  border-radius:8px;
}
button{
  background:var(--accent);
  border:0;
  padding:12px 16px;
  border-radius:8px;
  cursor:pointer;
  color:#001020;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="app">
<header>
<div class="logo">JARVIS</div>
<div class="status">ONLINE • v1.0</div>
</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Ask JARVIS something...">
<button onclick="sendMessage()">Send</button>
</footer>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let memory=JSON.parse(localStorage.getItem("jarvisMemory")||"{}");

function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function jarvisReply(text){
  let t=text.toLowerCase();

  if(t.includes("hello")||t.includes("hi")){
    return "Hello. JARVIS systems are online.";
  }
  if(t.includes("your name")){
    return "I am JARVIS, your personal assistant.";
  }
  if(t.includes("remember")){
    let item=text.replace(/remember/i,"").trim();
    memory.note=item;
    localStorage.setItem("jarvisMemory",JSON.stringify(memory));
    return "Memory stored.";
  }
  if(t.includes("memory")){
    return memory.note ? "Stored memory: "+memory.note : "No memories stored.";
  }
  return "I am ready. Additional modules can be added in future versions.";
}

function sendMessage(){
  let text=input.value.trim();
  if(!text)return;
  addMessage(text,"user");
  input.value="";

  setTimeout(()=>{
    addMessage(jarvisReply(text),"jarvis");
  },300);
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter")sendMessage();
});

addMessage("JARVIS initialized. Awaiting instructions.","jarvis");
</script>
</body>
</html>
