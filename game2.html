<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cookie Clicker</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

.cookie{
font-size:90px;
cursor:pointer;
user-select:none;
margin:20px;
transition:0.1s;
}

.cookie:active{
transform:scale(0.95);
}

.shop{
max-width:400px;
margin:0 auto;
text-align:left;
}

.upgrade{
background:#222;
padding:12px;
border-radius:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
background:#28a745;
color:white;
cursor:pointer;
}

small{
color:#aaa;
}
</style>
</head>

<body>

<h1>🍪 Cookie Clicker</h1>

<h2 id="cookies">0 Cookies</h2>

<div class="cookie" onclick="clickCookie()">🍪</div>

<p id="cps">0 cookies/sec</p>

<div class="shop">

<div class="upgrade">
<strong>Auto Clicker</strong><br>
<small>+1 cookie/sec</small>
<button onclick="buyAuto()">Buy (<span id="autoCost">15</span>)</button>
</div>

<div class="upgrade">
<strong>Grandma</strong><br>
<small>+5 cookies/sec</small>
<button onclick="buyGrandma()">Buy (<span id="grandmaCost">100</span>)</button>
</div>

<div class="upgrade">
<strong>Factory</strong><br>
<small>+20 cookies/sec</small>
<button onclick="buyFactory()">Buy (<span id="factoryCost">500</span>)</button>
</div>

</div>

<script>

let cookies = 0;
let cps = 0;

let autoCost = 15;
let grandmaCost = 100;
let factoryCost = 500;

function update(){
document.getElementById("cookies").innerText = Math.floor(cookies) + " Cookies";
document.getElementById("cps").innerText = cps + " cookies/sec";

document.getElementById("autoCost").innerText = autoCost;
document.getElementById("grandmaCost").innerText = grandmaCost;
document.getElementById("factoryCost").innerText = factoryCost;
}

function clickCookie(){
cookies++;
update();
}

function buyAuto(){
if(cookies >= autoCost){
cookies -= autoCost;
cps += 1;
autoCost = Math.floor(autoCost * 1.5);
update();
}
}

function buyGrandma(){
if(cookies >= grandmaCost){
cookies -= grandmaCost;
cps += 5;
grandmaCost = Math.floor(grandmaCost * 1.6);
update();
}
}

function buyFactory(){
if(cookies >= factoryCost){
cookies -= factoryCost;
cps += 20;
factoryCost = Math.floor(factoryCost * 1.7);
update();
}
}

setInterval(()=>{
cookies += cps;
update();
},1000);

update();

</script>

</body>
</html>
