<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flappy Bird</title>

<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(#70c5ce,#cfefff);
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

/* REAL SCREEN SIZE CANVAS (IMPORTANT FIX) */
function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* BIRD */
let bird={
x:0,
y:0,
vy:0,
size:20,
wing:0
};

/* FIX START POSITION (NOW ALWAYS VISIBLE) */
function resetBird(){
bird.x=c.width/4;
bird.y=c.height/2;
bird.vy=0;
}
resetBird();

/* PHYSICS */
let gravity=0.55;
let jump=-8;

/* GAME */
let pipes=[];
let frame=0;
let score=0;
let best=localStorage.getItem("flappy_best")||0;
let started=false;
let gameOver=false;

/* INPUT */
document.addEventListener("click",()=>{
if(!started){
started=true;
loop();
return;
}

if(gameOver){
location.reload();
return;
}

bird.vy=jump;
bird.wing=1;
});

/* PIPE */
function addPipe(){
let gap=150;
let top=Math.random()*(c.height-gap-120)+50;

pipes.push({
x:c.width,
top:top,
gap:gap,
w:60,
passed:false
});
}

/* BIRD DRAW */
function drawBird(){

ctx.fillStyle="yellow";
ctx.fillRect(bird.x,bird.y,bird.size,bird.size);

/* eye */
ctx.fillStyle="white";
ctx.fillRect(bird.x+12,bird.y+4,5,5);
ctx.fillStyle="black";
ctx.fillRect(bird.x+14,bird.y+6,2,2);

/* beak */
ctx.fillStyle="orange";
ctx.fillRect(bird.x+18,bird.y+8,6,4);

/* wing */
ctx.fillStyle="gold";
ctx.fillRect(bird.x,bird.y+(bird.wing?2:6),6,4);

bird.wing=0;
}

/* PIPE DRAW */
function drawPipe(p){

ctx.fillStyle="#1f8f3a";
ctx.fillRect(p.x,0,p.w,p.top);
ctx.fillRect(p.x,p.top+p.gap,p.w,c.height);

/* highlight */
ctx.fillStyle="#2ecc55";
ctx.fillRect(p.x+6,0,6,p.top);
ctx.fillRect(p.x+6,p.top+p.gap,6,c.height);
}

/* LOOP */
function loop(){

ctx.clearRect(0,0,c.width,c.height);

/* physics */
bird.vy+=gravity;
bird.y+=bird.vy;

/* spawn */
if(frame%80===0){
addPipe();
}

/* pipes */
for(let i=0;i<pipes.length;i++){
let p=pipes[i];
p.x-=3;

drawPipe(p);

/* collision */
if(
bird.x < p.x+p.w &&
bird.x+bird.size > p.x &&
(bird.y < p.top || bird.y+bird.size > p.top+p.gap)
){
end();
}

/* score */
if(!p.passed && p.x+p.w < bird.x){
score++;
p.passed=true;
}
}

/* ground */
ctx.fillStyle="#caa472";
ctx.fillRect(0,c.height-20,c.width,20);

/* bounds */
if(bird.y<0) bird.y=0;
if(bird.y>c.height-20) end();

/* UI */
ctx.fillStyle="white";
ctx.font="18px Arial";
ctx.fillText("Score: "+score,10,25);
ctx.fillText("Best: "+best,10,45);

/* loop */
frame++;
if(started && !gameOver){
requestAnimationFrame(loop);
}
}

/* END */
function end(){
gameOver=true;

if(score>best){
best=score;
localStorage.setItem("flappy_best",best);
}

setTimeout(()=>location.reload(),500);
}

</script>

</body>
</html>
