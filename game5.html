<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flappy Bird</title>

<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(#70c5ce,#dff6ff);
font-family:Arial;
}

canvas{
display:block;
}

/* overlay */
#overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#111;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="overlay">
<h2>Flappy Bird</h2>
<button onclick="start()">Start</button>
</div>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

/* RESPONSIVE CANVAS FIX */
function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

/* BIRD */
let bird={
x:80,
y:0,
vy:0,
size:20,
wing:0
};

bird.y=c.height/2;

/* PHYSICS */
let gravity=0.55;
let jump=-8;

/* GAME */
let pipes=[];
let frame=0;
let score=0;
let best=localStorage.getItem("flappy_best")||0;
let started=false;
let gameOver=false;

/* CLOUDS */
let clouds=[];
for(let i=0;i<6;i++){
clouds.push({
x:Math.random()*c.width,
y:Math.random()*c.height*0.4
});
}

/* START */
function start(){
document.getElementById("overlay").style.display="none";
started=true;
loop();
}

/* INPUT */
document.addEventListener("click",()=>{
if(!started) return;

if(gameOver){
location.reload();
return;
}

bird.vy=jump;
bird.wing=1;
});

/* PIPE */
function addPipe(){
let gap=150;
let top=Math.random()*(c.height*0.6)+50;

pipes.push({
x:c.width,
top:top,
gap:gap,
w:60,
passed:false
});
}

/* BIRD DRAW */
function drawBird(){

ctx.save();
ctx.translate(bird.x+10,bird.y+10);

/* tilt */
ctx.rotate(Math.min(Math.max(bird.vy*0.05,-0.7),0.8));

/* body */
ctx.fillStyle="yellow";
ctx.fillRect(-10,-10,bird.size,bird.size);

/* eye */
ctx.fillStyle="white";
ctx.fillRect(3,-6,5,5);
ctx.fillStyle="black";
ctx.fillRect(5,-4,2,2);

/* beak */
ctx.fillStyle="orange";
ctx.fillRect(10,-2,6,4);

/* wing animation */
ctx.fillStyle="gold";
ctx.fillRect(-8, bird.wing ? 2 : 6, 6, 4);

bird.wing=0;

ctx.restore();
}

/* PIPE DRAW */
function drawPipe(p){

ctx.fillStyle="#1f8f3a";
ctx.fillRect(p.x,0,p.w,p.top);
ctx.fillRect(p.x,p.top+p.gap,p.w,c.height);

/* highlight */
ctx.fillStyle="#2ecc55";
ctx.fillRect(p.x+6,0,6,p.top);
ctx.fillRect(p.x+6,p.top+p.gap,6,c.height);

/* caps */
ctx.fillStyle="#16682a";
ctx.fillRect(p.x-3,p.top-12,p.w+6,12);
ctx.fillRect(p.x-3,p.top+p.gap,p.w+6,12);
}

/* LOOP */
function loop(){

ctx.clearRect(0,0,c.width,c.height);

/* clouds */
ctx.fillStyle="rgba(255,255,255,0.7)";
clouds.forEach(cl=>{
cl.x-=0.4;
if(cl.x<-50) cl.x=c.width+50;

ctx.beginPath();
ctx.arc(cl.x,cl.y,18,0,Math.PI*2);
ctx.fill();
});

/* physics */
bird.vy+=gravity;
bird.y+=bird.vy;

/* pipes */
if(frame%70===0){
addPipe();
}

for(let i=0;i<pipes.length;i++){
let p=pipes[i];
p.x-=3;

drawPipe(p);

/* collision */
if(
bird.x < p.x+p.w &&
bird.x+bird.size > p.x &&
(bird.y < p.top || bird.y+bird.size > p.top+p.gap)
){
end();
}

/* score */
if(!p.passed && p.x+p.w < bird.x){
score++;
p.passed=true;
}
}

/* ground */
ctx.fillStyle="#caa472";
ctx.fillRect(0,c.height-20,c.width,20);

/* bounds */
if(bird.y<0 || bird.y>c.height){
end();
}

/* UI */
ctx.fillStyle="white";
ctx.font="18px Arial";
ctx.fillText("Score: "+score,10,25);
ctx.fillText("Best: "+best,10,45);

/* next frame */
frame++;
if(!gameOver){
requestAnimationFrame(loop);
}
}

/* GAME OVER */
function end(){
gameOver=true;

if(score>best){
best=score;
localStorage.setItem("flappy_best",best);
}

setTimeout(()=>{
location.reload();
},500);
}

</script>

</body>
</html>
