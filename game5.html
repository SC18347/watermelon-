<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flappy Bird</title>

<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(#70c5ce,#dff6ff);
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

/* CANVAS */
function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* GAME STATE */
let started=false;
let gameOver=false;

let score=0;
let best=localStorage.getItem("flappy_best")||0;

/* BIRD */
let bird={
x:80,
y:c.height/2,
vy:0,
size:20
};

/* PHYSICS */
let gravity=0.5;
let jump=-8;

/* PIPES */
let pipes=[];
let frame=0;

/* INPUT (mobile + desktop) */
document.addEventListener("click",()=>{
if(!started){
started=true;
loop();
return;
}

if(gameOver){
location.reload();
return;
}

bird.vy=jump;
});

/* PIPE CREATION */
function addPipe(){
let gap=150;
let top=Math.random()*(c.height-gap-120)+60;

pipes.push({
x:c.width,
top:top,
gap:gap,
w:60,
passed:false
});
}

/* DRAW BIRD */
function drawBird(){

ctx.fillStyle="yellow";
ctx.fillRect(bird.x,bird.y,bird.size,bird.size);

/* eye */
ctx.fillStyle="white";
ctx.fillRect(bird.x+12,bird.y+4,5,5);
ctx.fillStyle="black";
ctx.fillRect(bird.x+14,bird.y+6,2,2);

/* beak */
ctx.fillStyle="orange";
ctx.fillRect(bird.x+18,bird.y+8,6,4);
}

/* DRAW PIPE */
function drawPipe(p){

ctx.fillStyle="#1f8f3a";

/* top */
ctx.fillRect(p.x,0,p.w,p.top);

/* bottom */
ctx.fillRect(p.x,p.top+p.gap,p.w,c.height);

/* highlight */
ctx.fillStyle="#2ecc55";
ctx.fillRect(p.x+6,0,6,p.top);
ctx.fillRect(p.x+6,p.top+p.gap,6,c.height);
}

/* LOOP */
function loop(){

ctx.clearRect(0,0,c.width,c.height);

/* physics */
bird.vy+=gravity;
bird.y+=bird.vy;

/* spawn pipes */
if(frame%85===0){
addPipe();
}

/* update pipes */
for(let i=0;i<pipes.length;i++){
let p=pipes[i];
p.x-=3;

/* draw */
drawPipe(p);

/* collision */
if(
bird.x < p.x+p.w &&
bird.x+bird.size > p.x &&
(bird.y < p.top || bird.y+bird.size > p.top+p.gap)
){
end();
}

/* score */
if(!p.passed && p.x+p.w < bird.x){
score++;
p.passed=true;
}
}

/* ground */
ctx.fillStyle="#caa472";
ctx.fillRect(0,c.height-20,c.width,20);

/* bounds */
if(bird.y<0) bird.y=0;
if(bird.y>c.height-20) end();

/* UI */
ctx.fillStyle="white";
ctx.font="18px Arial";
ctx.fillText("Score: "+score,10,25);
ctx.fillText("Best: "+best,10,45);

/* next frame */
frame++;
if(started && !gameOver){
requestAnimationFrame(loop);
}
}

/* GAME OVER */
function end(){
gameOver=true;

if(score>best){
best=score;
localStorage.setItem("flappy_best",best);
}

setTimeout(()=>{
location.reload();
},500);
}

</script>

</body>
</html>
