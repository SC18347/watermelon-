<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flappy Bird</title>

<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(#70c5ce,#dff6ff);
font-family:Arial;
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

/* FIXED INTERNAL GAME RESOLUTION */
let W=400;
let H=600;

function resize(){
c.width=W;
c.height=H;
}
resize();

/* SCALE DRAWING TO FIT SCREEN */
function scaleX(x){ return x; }
function scaleY(y){ return y; }

/* BIRD */
let bird={
x:80,
y:50,
vy:0,
size:20,
wing:0
};

let gravity=0.5;
let jump=-8;

/* GAME */
let pipes=[];
let frame=0;
let score=0;
let best=localStorage.getItem("flappy_best")||0;
let started=false;
let gameOver=false;

/* START ON FIRST TAP */
document.addEventListener("click",()=>{
if(!started){
started=true;
loop();
return;
}

if(gameOver){
location.reload();
return;
}

bird.vy=jump;
bird.wing=1;
});

/* PIPE */
function addPipe(){
let gap=140;
let top=Math.random()*(H-gap-120)+60;

pipes.push({
x:W,
top:top,
gap:gap,
w:60,
passed:false
});
}

/* DRAW BIRD */
function drawBird(){

ctx.fillStyle="yellow";
ctx.fillRect(bird.x,bird.y,bird.size,bird.size);

/* eye */
ctx.fillStyle="white";
ctx.fillRect(bird.x+12,bird.y+4,5,5);
ctx.fillStyle="black";
ctx.fillRect(bird.x+14,bird.y+6,2,2);

/* beak */
ctx.fillStyle="orange";
ctx.fillRect(bird.x+18,bird.y+8,6,4);

/* wing */
ctx.fillStyle="gold";
ctx.fillRect(bird.x,bird.y+bird.wing?2:6,6,4);

bird.wing=0;
}

/* PIPE */
function drawPipe(p){

ctx.fillStyle="#1f8f3a";
ctx.fillRect(p.x,0,p.w,p.top);
ctx.fillRect(p.x,p.top+p.gap,p.w,H);

/* highlight */
ctx.fillStyle="#2ecc55";
ctx.fillRect(p.x+6,0,6,p.top);
ctx.fillRect(p.x+6,p.top+p.gap,6,H);
}

/* LOOP */
function loop(){

ctx.clearRect(0,0,W,H);

/* physics */
bird.vy+=gravity;
bird.y+=bird.vy;

/* spawn */
if(frame%80===0){
addPipe();
}

/* pipes */
for(let i=0;i<pipes.length;i++){
let p=pipes[i];
p.x-=3;

drawPipe(p);

/* collision */
if(
bird.x < p.x+p.w &&
bird.x+bird.size > p.x &&
(bird.y < p.top || bird.y+bird.size > p.top+p.gap)
){
end();
}

/* score */
if(!p.passed && p.x+p.w < bird.x){
score++;
p.passed=true;
}
}

/* ground */
ctx.fillStyle="#caa472";
ctx.fillRect(0,H-20,W,20);

/* bounds FIX */
if(bird.y<0) bird.y=0;
if(bird.y>H-20) end();

/* UI */
ctx.fillStyle="white";
ctx.font="18px Arial";
ctx.fillText("Score: "+score,10,25);
ctx.fillText("Best: "+best,10,45);

/* loop */
frame++;
requestAnimationFrame(loop);
}

/* END */
function end(){
gameOver=true;

if(score>best){
best=score;
localStorage.setItem("flappy_best",best);
}

setTimeout(()=>location.reload(),500);
}

</script>

</body>
</html>
