<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flappy Game</title>

<style>
body{
margin:0;
background:#70c5ce;
overflow:hidden;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#70c5ce;
}

/* TRY AGAIN BUTTON */
#ui{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
display:none;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#111;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">
<h2 style="color:white;">Game Over</h2>
<button onclick="restart()">Try Again</button>
</div>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=400;
canvas.height=600;

/* BIRD */
let bird, pipes, frame, score, best, gameOver;

function init(){
bird={
x:80,
y:200,
vy:0,
size:20
};

pipes=[];
frame=0;
score=0;
gameOver=false;
document.getElementById("ui").style.display="none";
}

init();

/* DIFFICULTY */
let gravity=0.65;
let jump=-8.5;

/* INPUT */
document.addEventListener("click",()=>{
if(gameOver) return;
bird.vy=jump;
});

/* PIPE */
function addPipe(){
let gap=140;
let top=Math.random()*(canvas.height-gap-100)+50;

pipes.push({
x:canvas.width,
top:top,
gap:gap,
w:50,
passed:false
});
}

/* DRAW */
function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* physics */
bird.vy+=gravity;
bird.y+=bird.vy;

/* bird */
ctx.fillStyle="yellow";
ctx.fillRect(bird.x,bird.y,bird.size,bird.size);

/* spawn faster */
if(frame%60===0){
addPipe();
}

/* pipes */
for(let i=0;i<pipes.length;i++){
let p=pipes[i];
p.x-=4;

ctx.fillStyle="green";
ctx.fillRect(p.x,0,p.w,p.top);
ctx.fillRect(p.x,p.top+p.gap,p.w,canvas.height);

/* collision */
if(
bird.x < p.x+p.w &&
bird.x+bird.size > p.x &&
(bird.y < p.top || bird.y+bird.size > p.top+p.gap)
){
end();
}

/* score */
if(!p.passed && p.x+p.w < bird.x){
score++;
p.passed=true;
}
}

/* ground */
ctx.fillStyle="#caa472";
ctx.fillRect(0,canvas.height-20,canvas.width,20);

/* bounds */
if(bird.y>canvas.height || bird.y<0){
end();
}

/* UI */
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,10,30);

best=localStorage.getItem("flappy_best")||0;
if(score>best){
best=score;
localStorage.setItem("flappy_best",best);
}
ctx.fillText("Best: "+best,10,55);

/* loop */
frame++;
if(!gameOver){
requestAnimationFrame(loop);
}
}

/* GAME OVER */
function end(){
gameOver=true;
document.getElementById("ui").style.display="block";
}

/* RESTART BUTTON */
function restart(){
init();
loop();
}

/* START */
loop();

</script>

</body>
</html>
