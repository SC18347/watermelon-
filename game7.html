html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Space Surfer</title>
    <style>
        body { margin: 0; padding: 0; background: #060614; color: #fff; font-family: sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { background: #0b0b20; border: 2px solid #00f3ff; max-width: 100%; max-height: 100%; aspect-ratio: 3/4; }
        .ui-layer { position: absolute; top: 15px; display: flex; justify-content: space-between; width: 85%; max-width: 400px; font-weight: bold; font-size: 1.2rem; pointer-events: none; text-shadow: 0 0 8px #00f3ff; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="ui-layer">
            <div>Score: <span id="score">0</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas" width="360" height="480"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let player = { x: 160, y: 400, size: 30, speed: 6 };
        let obstacles = [], score = 0, lives = 3, gameActive = true;
        let moveLeft = false, moveRight = false;

        // Desktop Listeners
        document.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft" || e.key === "a") moveLeft = true;
            if (e.key === "ArrowRight" || e.key === "d") moveRight = true;
        });
        document.addEventListener("keyup", e => {
            if (e.key === "ArrowLeft" || e.key === "a") moveLeft = false;
            if (e.key === "ArrowRight" || e.key === "d") moveRight = false;
        });

        // Mobile Smart Touch Listeners
        window.addEventListener("touchstart", e => {
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) moveLeft = true;
            else moveRight = true;
        }, { passive: true });

        window.addEventListener("touchend", e => {
            if (e.touches.length === 0) { moveLeft = false; moveRight = false; }
        });

        function spawnObstacle() {
            if (!gameActive) return;
            obstacles.push({
                x: Math.random() * (canvas.width - 25),
                y: -30, size: 25,
                speed: 3 + Math.random() * 4
            });
            setTimeout(spawnObstacle, Math.max(300, 900 - score * 5));
        }

        function loop() {
            if (!gameActive) return;

            // Physics Update
            if (moveLeft) player.x = Math.max(0, player.x - player.speed);
            if (moveRight) player.x = Math.min(canvas.width - player.size, player.x + player.speed);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Ship (Neon Triangle)
            ctx.fillStyle = "#00ff66";
            ctx.shadowColor = "#00ff66";
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(player.x + player.size / 2, player.y);
            ctx.lineTo(player.x, player.y + player.size);
            ctx.lineTo(player.x + player.size, player.y + player.size);
            ctx.closePath();
            ctx.fill();

            // Obstacles handling
            ctx.fillStyle = "#ff0055";
            ctx.shadowColor = "#ff0055";
            
            obstacles.forEach((obs, index) => {
                obs.y += obs.speed;
                ctx.fillRect(obs.x, obs.y, obs.size, obs.size);

                // Check collision
                if (obs.x < player.x + player.size && obs.x + obs.size > player.x && obs.y < player.y + player.size && obs.y + obs.size > player.y) {
                    obstacles.splice(index, 1);
                    lives--;
                    document.getElementById("lives").textContent = lives;
                    if (lives <= 0) { gameActive = false; alert("Game Over! Score: " + score); location.reload(); }
                }

                // Pass safely
                if (obs.y > canvas.height) {
                    obstacles.splice(index, 1);
                    score += 10;
                    document.getElementById("score").textContent = score;
                }
            });

            ctx.shadowBlur = 0;
            requestAnimationFrame(loop);
        }

        spawnObstacle();
        loop();
    </script>
</body>
</html>
