<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Defender</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #050510; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { background: #0a0a1a; box-shadow: 0 0 30px rgba(0, 243, 255, 0.3); border: 2px solid #00f3ff; border-radius: 4px; }
        h1 { margin: 5px 0; text-shadow: 0 0 10px #00f3ff; font-size: 1.8rem; }
        p { margin: 5px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Score: <span id="score">0</span> | Lives: <span id="lives">3</span></h1>
    <p>← Use A / D or Arrow Keys to Move | Spacebar to Shoot →</p>
    <canvas id="gameCanvas" width="600" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let player = { x: 275, y: 450, width: 40, height: 20, speed: 6 };
        let bullets = [], enemies = [], keys = {}, score = 0, lives = 3, gameActive = true;

        document.addEventListener("keydown", e => keys[e.key] = true);
        document.addEventListener("keyup", e => keys[e.key] = false);

        function spawnEnemy() {
            if (!gameActive) return;
            let size = 25;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: 1.5 + Math.random() * 2
            });
            setTimeout(spawnEnemy, Math.max(400, 1200 - score * 10));
        }

        function update() {
            if (!gameActive) return;

            // Player movement
            if (keys["ArrowLeft"] || keys["a"]) player.x = Math.max(0, player.x - player.speed);
            if (keys["ArrowRight"] || keys["d"]) player.x = Math.min(canvas.width - player.width, player.x + player.speed);

            // Fire laser
            if (keys[" "] && (bullets.length === 0 || bullets[bullets.length - 1].y < player.y - 120)) {
                bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 12, speed: 8 });
            }

            // Move Lasers
            bullets.forEach((b, i) => {
                b.y -= b.speed;
                if (b.y < 0) bullets.splice(i, 1);
            });

            // Move Enemies
            enemies.forEach((e, ei) => {
                e.y += e.speed;
                
                // Bottom crash
                if (e.y > canvas.height) {
                    enemies.splice(ei, 1);
                    loseLife();
                }

                // Laser vs Enemy collision
                bullets.forEach((b, bi) => {
                    if (b.x < e.x + e.width && b.x + b.width > e.x && b.y < e.y + e.height && b.y + b.height > e.y) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        document.getElementById("score").textContent = score;
                    }
                });
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw player (Neon Green Ship)
            ctx.fillStyle = "#00ff66";
            ctx.shadowColor = "#00ff66";
            ctx.shadowBlur = 15;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw Lasers (Neon Pink)
            ctx.fillStyle = "#ff007f";
            ctx.shadowColor = "#ff007f";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

            // Draw Enemies (Neon Cyan Grid bugs)
            ctx.fillStyle = "#00f3ff";
            ctx.shadowColor = "#00f3ff";
            enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));
            
            ctx.shadowBlur = 0; // Reset blur
        }

        function loseLife() {
            lives--;
            document.getElementById("lives").textContent = lives;
            if (lives <= 0) {
                gameActive = false;
                alert("Game Over! Final Score: " + score);
                location.reload();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        spawnEnemy();
        gameLoop();
    </script>
</body>
</html>
