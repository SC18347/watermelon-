<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Ball Pool</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#101010;
font-family:Arial;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#deviceOverlay{
position:fixed;
inset:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.menu{
background:#1c1c1c;
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
}

.menu button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

.mobileBtn{background:#2196f3;color:#fff;}
.pcBtn{background:#4caf50;color:#fff;}

#gameWrapper{
display:none;
width:100vw;
height:100vh;
justify-content:center;
align-items:center;
}

#tableContainer{
position:relative;
transform-origin:center;
}

canvas{
background:#0d5e25;
border:12px solid #5d3416;
border-radius:20px;
touch-action:none;
}
</style>
</head>

<body>

<div id="deviceOverlay">
<div class="menu">
<h1>🎱 8 Ball Pool</h1>
<button id="mobileBtn">📱 Mobile</button>
<button id="pcBtn">💻 PC</button>
</div>
</div>

<div id="gameWrapper">
<div id="tableContainer">
<canvas id="game" width="800" height="400"></canvas>
</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = 800;
const H = 400;
const R = 10;

let balls = [];
let running = false;

// =====================
// BALLS
// =====================
function addBall(x,y,n,type,color){
balls.push({x,y,vx:0,vy:0,r:R,num:n,type,color,pocketed:false});
}

function rack(){
balls = [];
addBall(180,200,0,"cue","#fff");

let startX=580;
let startY=200;
let n=1;

for(let r=0;r<5;r++){
for(let c=0;c<=r;c++){

let type="solid";
if(n===8) type="eight";
if(n>8) type="stripe";

addBall(startX+r*20,startY-r*10+c*20,n,type,"#f4d03f");
n++;
}
}
}

// =====================
// INPUT
// =====================
let down=false,ax=0,ay=0;

canvas.addEventListener("pointerdown",(e)=>{
let r=canvas.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;

let cue=balls[0];
if(!cue) return;

if(Math.hypot(x-cue.x,y-cue.y)<40){
down=true;ax=x;ay=y;
}
});

canvas.addEventListener("pointermove",(e)=>{
if(!down) return;
let r=canvas.getBoundingClientRect();
ax=e.clientX-r.left;
ay=e.clientY-r.top;
});

canvas.addEventListener("pointerup",()=>{
if(!down) return;
down=false;

let cue=balls[0];
cue.vx=(cue.x-ax)*0.2;
cue.vy=(cue.y-ay)*0.2;
});

// =====================
// PHYSICS
// =====================
function update(){
for(let b of balls){

if(b.pocketed) continue;

b.x+=b.vx;
b.y+=b.vy;

b.vx*=0.988;
b.vy*=0.988;

// walls
if(b.x<R){b.x=R;b.vx*=-0.95}
if(b.x>W-R){b.x=W-R;b.vx*=-0.95}
if(b.y<R){b.y=R;b.vy*=-0.95}
if(b.y>H-R){b.y=H-R;b.vy*=-0.95}
}
}

// =====================
// COLLISION
// =====================
function collide(a,b){
let dx=b.x-a.x;
let dy=b.y-a.y;
let dist=Math.hypot(dx,dy);
if(dist===0||dist>R*2) return;

let nx=dx/dist;
let ny=dy/dist;

let overlap=R*2-dist;

a.x-=nx*overlap/2;
a.y-=ny*overlap/2;
b.x+=nx*overlap/2;
b.y+=ny*overlap/2;

let vx=b.vx-a.vx;
let vy=b.vy-a.vy;

let dot=vx*nx+vy*ny;
if(dot>0) return;

a.vx+=dot*nx;
a.vy+=dot*ny;
b.vx-=dot*nx;
b.vy-=dot*ny;
}

function handleCollisions(){
for(let i=0;i<balls.length;i++){
for(let j=i+1;j<balls.length;j++){
collide(balls[i],balls[j]);
}
}
}

// =====================
// DRAW
// =====================
function draw(){
ctx.clearRect(0,0,W,H);
ctx.fillStyle="#0d5e25";
ctx.fillRect(0,0,W,H);

for(let b of balls){
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fillStyle=b.type==="cue"?"#fff":"#f4d03f";
ctx.fill();
}
}

// =====================
// LOOP
// =====================
function loop(){
if(!running) return;

update();
handleCollisions();
draw();

requestAnimationFrame(loop);
}

// =====================
// START SYSTEM FIXED
// =====================
function startGame(isMobile){
document.getElementById("deviceOverlay").style.display="none";
document.getElementById("gameWrapper").style.display="flex";

if(!running){
running=true;
rack();
loop();
}
}

document.getElementById("pcBtn").onclick=()=>startGame(false);
document.getElementById("mobileBtn").onclick=()=>startGame(true);

</script>

</body>
</html>
