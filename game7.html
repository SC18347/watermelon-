<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Ball Pool</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#101010;
font-family:Arial;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#deviceOverlay{
position:fixed;
inset:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.menu{
background:#1c1c1c;

}

margin-bottom:15px;
}

<body>

<div id="deviceOverlay">
<div class="menu">
<h1>🎱 8 Ball Pool</h1>
<p>Select device</p>
<button class="mobileBtn" id="mobileBtn">📱 Mobile</button>
<button class="pcBtn" id="pcBtn">💻 PC</button>
</div>
</div>

<div id="gameWrapper">
<div id="tableContainer">
<div id="infoBar">Loading...</div>
<canvas id="game" width="800" height="400"></canvas>
</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const TABLE_W = 800;
const TABLE_H = 400;
const BALL_R = 10;

let isMobile = false;

const balls = [];
// =====================
// POCKETS
// =====================
const pockets = [
  { x: 0, y: 0, r: 22 },
  { x: TABLE_W / 2, y: 0, r: 22 },
  { x: TABLE_W, y: 0, r: 22 },
  { x: 0, y: TABLE_H, r: 22 },
  { x: TABLE_W / 2, y: TABLE_H, r: 22 },
  { x: TABLE_W, y: TABLE_H, r: 22 }
];

// =====================
// BALL CREATION
// =====================
function createBall(x, y, num, type, color) {
  balls.push({
    x,
    y,
    vx: 0,
    vy: 0,
    r: BALL_R,
    num,
    type,
    color,
    pocketed: false
  });
}

// =====================
// RACK SETUP (15 BALLS)
// =====================
function createRack() {
  balls.length = 0;

  // cue ball
  createBall(180, TABLE_H / 2, 0, "cue", "#ffffff");

  const rack = [
    { n: 1, c: "#f4d03f", t: "solid" },
    { n: 2, c: "#2980b9", t: "solid" },
    { n: 3, c: "#c0392b", t: "solid" },
    { n: 4, c: "#8e44ad", t: "solid" },
    { n: 5, c: "#d35400", t: "solid" },
    { n: 6, c: "#27ae60", t: "solid" },
    { n: 7, c: "#7f0000", t: "solid" },
    { n: 8, c: "#111111", t: "eight" },
    { n: 9, c: "#f4d03f", t: "stripe" },
    { n: 10, c: "#2980b9", t: "stripe" },
    { n: 11, c: "#c0392b", t: "stripe" },
    { n: 12, c: "#8e44ad", t: "stripe" },
    { n: 13, c: "#d35400", t: "stripe" },
    { n: 14, c: "#27ae60", t: "stripe" },
    { n: 15, c: "#7f0000", t: "stripe" }
  ];

  let startX = 580;
  let startY = TABLE_H / 2;

  let index = 0;

  const spacing = BALL_R * 2;

  for (let row = 0; row < 5; row++) {
    for (let col = 0; col <= row; col++) {
      const b = rack[index++];

      createBall(
        startX + row * spacing,
        startY - row * BALL_R + col * spacing,
        b.n,
        b.t,
        b.c
      );
    }
  }
}

// =====================
// DRAW BALLS
// =====================
function drawBall(b) {
  if (b.pocketed) return;

  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);

  if (b.type === "cue") ctx.fillStyle = "#fff";
  else if (b.type === "eight") ctx.fillStyle = "#111";
  else if (b.type === "stripe") ctx.fillStyle = "#fff";
  else ctx.fillStyle = b.color;

  ctx.fill();
  ctx.strokeStyle = "#000";
  ctx.stroke();

  ctx.fillStyle = "#000";
  ctx.font = "10px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(b.num, b.x, b.y);
}

// =====================
// DRAW POCKETS
// =====================
function drawPockets() {
  ctx.fillStyle = "#000";
  for (let p of pockets) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// =====================
// TABLE DRAW
// =====================
function drawTable() {
  ctx.clearRect(0, 0, TABLE_W, TABLE_H);

  ctx.fillStyle = "#0d5e25";
  ctx.fillRect(0, 0, TABLE_W, TABLE_H);

  drawPockets();

  for (let b of balls) {
    drawBall(b);
  }
}
// =====================
// PHYSICS SETTINGS
// =====================
const FRICTION = 0.988;
const RESTITUTION = 0.95;
const MIN_VEL = 0.05;

// =====================
// UPDATE PHYSICS
// =====================
function updatePhysics() {
  for (let i = 0; i < balls.length; i++) {
    let b = balls[i];
    if (b.pocketed) continue;

    // move
    b.x += b.vx;
    b.y += b.vy;

    // friction
    b.vx *= FRICTION;
    b.vy *= FRICTION;

    if (Math.abs(b.vx) < MIN_VEL) b.vx = 0;
    if (Math.abs(b.vy) < MIN_VEL) b.vy = 0;

    // walls
    if (b.x - b.r < 0) {
      b.x = b.r;
      b.vx *= -RESTITUTION;
    }

    if (b.x + b.r > TABLE_W) {
      b.x = TABLE_W - b.r;
      b.vx *= -RESTITUTION;
    }

    if (b.y - b.r < 0) {
      b.y = b.r;
      b.vy *= -RESTITUTION;
    }

    if (b.y + b.r > TABLE_H) {
      b.y = TABLE_H - b.r;
      b.vy *= -RESTITUTION;
    }

    // pockets
    for (let p of pockets) {
      let dx = b.x - p.x;
      let dy = b.y - p.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < p.r) {
        if (b.type === "cue") {
          // scratch reset
          b.x = 180;
          b.y = TABLE_H / 2;
          b.vx = 0;
          b.vy = 0;
        } else {
          b.pocketed = true;
          b.vx = 0;
          b.vy = 0;
        }
      }
    }
  }
}

// =====================
// GAME LOOP
// =====================
function loop() {
  updatePhysics();
  drawTable();
  requestAnimationFrame(loop);
}

// =====================
// DEVICE BUTTONS
// =====================
document.getElementById("pcBtn").onclick = () => {
  document.getElementById("deviceOverlay").style.display = "none";
  document.getElementById("gameWrapper").style.display = "flex";
};

document.getElementById("mobileBtn").onclick = () => {
  document.getElementById("deviceOverlay").style.display = "none";
  document.getElementById("gameWrapper").style.display = "flex";
};

// =====================
// START GAME
// =====================
createRack();
loop();
// =====================
// BALL-TO-BALL COLLISIONS
// =====================
function resolveCollision(b1, b2) {
  let dx = b2.x - b1.x;
  let dy = b2.y - b1.y;
  let dist = Math.sqrt(dx * dx + dy * dy);

  let minDist = b1.r + b2.r;

  if (dist === 0 || dist > minDist) return;

  // overlap fix (anti-stick)
  let overlap = minDist - dist;
  let nx = dx / dist;
  let ny = dy / dist;

  b1.x -= nx * overlap / 2;
  b1.y -= ny * overlap / 2;
  b2.x += nx * overlap / 2;
  b2.y += ny * overlap / 2;

  // relative velocity
  let vx = b2.vx - b1.vx;
  let vy = b2.vy - b1.vy;

  let impactSpeed = vx * nx + vy * ny;

  if (impactSpeed > 0) return;

  let impulse = -2 * impactSpeed / 2;

  b1.vx -= impulse * nx;
  b1.vy -= impulse * ny;
  b2.vx += impulse * nx;
  b2.vy += impulse * ny;
}

// =====================
// CHECK ALL COLLISIONS
// =====================
function handleCollisions() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      let a = balls[i];
      let b = balls[j];

      if (a.pocketed || b.pocketed) continue;

      resolveCollision(a, b);
    }
  }
}
// =====================
// POINTER CONTROLS (AIM + SHOOT)
// =====================

let isDown = false;
let aimX = 0;
let aimY = 0;

const cueBallIndex = 0;

function getCueBall() {
  return balls.find(b => b.type === "cue");
}

canvas.addEventListener("pointerdown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;

  const cue = getCueBall();
  if (!cue || cue.pocketed) return;

  const dx = cx - cue.x;
  const dy = cy - cue.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  // only allow grab near cue ball
  if (dist < 40) {
    isDown = true;
    aimX = cx;
    aimY = cy;
  }
});

canvas.addEventListener("pointermove", (e) => {
  if (!isDown) return;

  const rect = canvas.getBoundingClientRect();
  aimX = e.clientX - rect.left;
  aimY = e.clientY - rect.top;
});

canvas.addEventListener("pointerup", () => {
  if (!isDown) return;
  isDown = false;

  const cue = getCueBall();
  if (!cue) return;

  // pull-back shot mechanic
  let dx = cue.x - aimX;
  let dy = cue.y - aimY;

  cue.vx = dx * 0.15;
  cue.vy = dy * 0.15;
});

// =====================
// AIM LINE DRAWING
// =====================
function drawAimLine() {
  if (!isDown) return;

  const cue = getCueBall();
  if (!cue) return;

  ctx.strokeStyle = "rgba(255,255,255,0.6)";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(cue.x, cue.y);
  ctx.lineTo(aimX, aimY);
  ctx.stroke();
}
// =====================
// FINAL INTEGRATION FIXES
// =====================

// update drawTable to include aim line
const originalDrawTable = drawTable;

drawTable = function () {
  ctx.clearRect(0, 0, TABLE_W, TABLE_H);

  ctx.fillStyle = "#0d5e25";
  ctx.fillRect(0, 0, TABLE_W, TABLE_H);

  drawPockets();

  for (let b of balls) {
    drawBall(b);
  }

  drawAimLine();
};

// replace loop if needed safety check
if (typeof loop !== "undefined") {
  const oldLoop = loop;

  loop = function () {
    updatePhysics();
    handleCollisions();
    drawTable();
    requestAnimationFrame(loop);
  };
}

// fallback if loop wasn't defined
if (typeof loop === "undefined") {
  function loop() {
    updatePhysics();
    handleCollisions();
    drawTable();
    requestAnimationFrame(loop);
  }
}

// ensure start is safe
createRack();
requestAnimationFrame(loop);
<!-- =====================
MOBILE SCALING + CLEAN FINAL POLISH
===================== -->

function fitMobile() {
  const container = document.getElementById("tableContainer");

  const scale = Math.min(
    (window.innerWidth - 20) / TABLE_W,
    (window.innerHeight - 80) / TABLE_H
  );

  container.style.transform = `scale(${scale})`;
}

window.addEventListener("resize", () => {
  if (document.getElementById("gameWrapper").style.display === "flex") {
    fitMobile();
  }
});

// hook device buttons properly
document.getElementById("pcBtn").addEventListener("click", () => {
  document.getElementById("deviceOverlay").style.display = "none";
  document.getElementById("gameWrapper").style.display = "flex";
});

document.getElementById("mobileBtn").addEventListener("click", () => {
  document.getElementById("deviceOverlay").style.display = "none";
  document.getElementById("gameWrapper").style.display = "flex";
  fitMobile();
});

// safety: ensure aim line exists
if (typeof drawAimLine !== "function") {
  function drawAimLine() {}
}
// =====================
// FINAL START + SAFETY INIT (P8)
// =====================

window.addEventListener("load", () => {

  // ensure rack exists
  if (typeof createRack === "function") {
    createRack();
  }

  // start main loop safely
  if (typeof loop === "function") {
    requestAnimationFrame(loop);
  }

});

<script>

// =====================
// CORE STATE
// =====================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = 800;
const H = 400;

const R = 10;

const FRICTION = 0.988;
const REST = 0.95;

const balls = [];

const pockets = [
{ x:0,y:0,r:22 },
{ x:W/2,y:0,r:22 },
{ x:W,y:0,r:22 },
{ x:0,y:H,r:22 },
{ x:W/2,y:H,r:22 },
{ x:W,y:H,r:22 }
];

// =====================
// BALL CREATION
// =====================
function addBall(x,y,n,type,color){
balls.push({x,y,vx:0,vy:0,r:R,num:n,type,color,pocketed:false});
}

// =====================
// RACK
// =====================
function rack(){
balls.length=0;
addBall(180,200,0,"cue","#fff");

const startX=580;
const startY=200;

let nums=1;

for(let row=0;row<5;row++){
for(let col=0;col<=row;col++){

let type="solid";
let color="#f4d03f";

if(nums===8) type="eight";
if(nums>8) type="stripe";

addBall(
startX + row*20,
startY - row*10 + col*20,
nums,
type,
color
);

nums++;
}
}
}

// =====================
// DRAW
// =====================
function drawBall(b){
if(b.pocketed) return;

ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);

if(b.type==="cue") ctx.fillStyle="#fff";
else if(b.type==="eight") ctx.fillStyle="#111";
else ctx.fillStyle=b.color;

ctx.fill();
ctx.stroke();
}

function drawTable(){
ctx.clearRect(0,0,W,H);
ctx.fillStyle="#0d5e25";
ctx.fillRect(0,0,W,H);

ctx.fillStyle="black";
for(let p of pockets){
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
}

for(let b of balls) drawBall(b);
}

// =====================
// PHYSICS
// =====================
function update(){

for(let b of balls){

if(b.pocketed) continue;

b.x+=b.vx;
b.y+=b.vy;

b.vx*=FRICTION;
b.vy*=FRICTION;

// walls
if(b.x<R){b.x=R;b.vx*=-REST}
if(b.x>W-R){b.x=W-R;b.vx*=-REST}
if(b.y<R){b.y=R;b.vy*=-REST}
if(b.y>H-R){b.y=H-R;b.vy*=-REST}

// pockets
for(let p of pockets){
let dx=b.x-p.x;
let dy=b.y-p.y;
if(Math.sqrt(dx*dx+dy*dy)<p.r){
if(b.type==="cue"){
b.x=180;b.y=200;b.vx=0;b.vy=0;
}else{
b.pocketed=true;
}
}
}

}

}

// =====================
// COLLISION
// =====================
function collide(a,b){

let dx=b.x-a.x;
let dy=b.y-a.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist===0||dist>R*2) return;

let nx=dx/dist;
let ny=dy/dist;

let overlap=R*2-dist;

a.x-=nx*overlap/2;
a.y-=ny*overlap/2;
b.x+=nx*overlap/2;
b.y+=ny*overlap/2;

let vx=b.vx-a.vx;
let vy=b.vy-a.vy;

let dot=vx*nx+vy*ny;

if(dot>0) return;

let impulse=dot;

a.vx+=impulse*nx;
a.vy+=impulse*ny;
b.vx-=impulse*nx;
b.vy-=impulse*ny;

}

function handleCollisions(){
for(let i=0;i<balls.length;i++){
for(let j=i+1;j<balls.length;j++){
if(!balls[i].pocketed && !balls[j].pocketed){
collide(balls[i],balls[j]);
}
}
}
}

// =====================
// AIM + SHOOT
// =====================
let down=false;
let ax=0,ay=0;

canvas.addEventListener("pointerdown",(e)=>{
let r=canvas.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;

let cue=balls[0];

if(Math.hypot(x-cue.x,y-cue.y)<40){
down=true;
ax=x;ay=y;
}
});

canvas.addEventListener("pointermove",(e)=>{
if(!down)return;
let r=canvas.getBoundingClientRect();
ax=e.clientX-r.left;
ay=e.clientY-r.top;
});

canvas.addEventListener("pointerup",()=>{
if(!down)return;
down=false;

let cue=balls[0];

cue.vx=(cue.x-ax)*0.2;
cue.vy=(cue.y-ay)*0.2;
});

// =====================
// AIM LINE
// =====================
function aim(){
if(!down)return;
let cue=balls[0];

ctx.strokeStyle="white";
ctx.beginPath();
ctx.moveTo(cue.x,cue.y);
ctx.lineTo(ax,ay);
ctx.stroke();
}

// =====================
// LOOP
// =====================
function loop(){
update();
handleCollisions();
drawTable();
aim();
requestAnimationFrame(loop);
}

// =====================
// START
// =====================
rack();
loop();

</script>
