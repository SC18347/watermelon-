<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Ball Pool</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#101010;
font-family:Arial,sans-serif;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#deviceOverlay{
position:fixed;
inset:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.menu{
background:#1c1c1c;
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
box-shadow:0 0 25px rgba(0,0,0,.5);
}

.menu h1{
margin-bottom:20px;
font-size:28px;
}

.menu p{
margin-bottom:20px;
color:#aaa;
}

.menu button{
width:100%;
padding:15px;
margin:8px 0;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
transition:.2s;
}

.menu button:hover{
transform:scale(1.03);
}

.mobileBtn{
background:#2196f3;
color:white;
}

.pcBtn{
background:#4caf50;
color:white;
}

#gameWrapper{
display:none;
justify-content:center;
align-items:center;
width:100vw;
height:100vh;
}

#tableContainer{
position:relative;
transform-origin:center center;
}

canvas{
background:#0d5e25;
border:12px solid #5d3416;
border-radius:20px;
display:block;
touch-action:none;
box-shadow:0 0 30px rgba(0,0,0,.5);
}

#infoBar{
position:absolute;
top:-40px;
left:0;
width:100%;
text-align:center;
font-size:18px;
font-weight:bold;
color:white;
}
</style>
</head>

<body>

<div id="deviceOverlay">
<div class="menu">
<h1>🎱 8 Ball Pool</h1>
<p>Select your device</p>

<button class="mobileBtn" id="mobileBtn">
📱 iOS / Mobile
</button>

<button class="pcBtn" id="pcBtn">
💻 Computer / PC
</button>
</div>
</div>

<div id="gameWrapper">

<div id="tableContainer">

<div id="infoBar">
Drag backward from the cue ball to shoot
</div>

<canvas id="game" width="800" height="400"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const gameWrapper=document.getElementById("gameWrapper");
const deviceOverlay=document.getElementById("deviceOverlay");
const tableContainer=document.getElementById("tableContainer");

let isMobileLayout=false;

function fitMobile(){

const margin=20;

const availableWidth=window.innerWidth-margin;
const availableHeight=window.innerHeight-80;

const scale=Math.min(
availableWidth/800,
availableHeight/400
);

tableContainer.style.transform=
`scale(${scale})`;
}

function setupPC(){

isMobileLayout=false;

deviceOverlay.style.display="none";
gameWrapper.style.display="flex";

tableContainer.style.transform="scale(1)";
}

function setupMobile(){

isMobileLayout=true;

deviceOverlay.style.display="none";
gameWrapper.style.display="flex";

fitMobile();
}

document
.getElementById("pcBtn")
.addEventListener("click",setupPC);

document
.getElementById("mobileBtn")
.addEventListener("click",setupMobile);

window.addEventListener("resize",()=>{

if(isMobileLayout){
fitMobile();
}

});

function drawTable(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="#0d5e25";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

}

function gameLoop(){

drawTable();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
