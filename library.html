<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Library</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:20px;
}
h1,h2{
text-align:center;
}
input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:20px;
font-size:16px;
}
.featured{
background:#222;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:25px;
}
.playbtn{
display:inline-block;
padding:12px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:10px;
margin-top:10px;
}
.categories{
text-align:center;
margin-bottom:20px;
}
.categories span{
display:inline-block;
background:#222;
padding:8px 12px;
border-radius:8px;
margin:4px;
}
.games{
display:grid;
gap:15px;
}
.game{
background:#222;
border-radius:15px;
overflow:hidden;
text-decoration:none;
color:white;
}
.game img{
width:100%;
height:140px;
object-fit:cover;
}
.gameinfo{
padding:12px;
}
.small{
font-size:14px;
color:#ccc;
}
</style>
</head>
<body>
<h1>🎮 Game Library</h1>
<input id="search" placeholder="Search games..." onkeyup="searchGames()">
<div class="featured">
<h2>⭐ Featured Game</h2>
<p>Play the featured game right now.</p>
<a class="playbtn" href="game1.html">Play Now</a>
</div>
<div class="categories">
<span>Platformer</span>
<span>Puzzle</span>
<span>Action</span>
<span>Arcade</span>
</div>
<h2>🏆 Top Games</h2>
<div class="games" id="games">
<a class="game" href="game1.html">
<img src="https://picsum.photos/400/200" alt="">
<div class="gameinfo">
<h3>My First Game</h3>
<p class="small">Platformer Adventure</p>
</div>
</a>
<a class="game" href="game2.html">
<img src="https://picsum.photos/401/200" alt="">
<div class="gameinfo">
<h3>My Second Game</h3>
<p class="small">Puzzle Game</p>
</div>
</a>
</div>
<h2>🆕 New Games</h2>
<div class="games">
<a class="game" href="game3.html">
<img src="https://picsum.photos/402/200" alt="">
<div class="gameinfo">
<h3>Newest Game</h3>
<p class="small">Recently Added</p>
</div>
</a>
</div>
<script>
function searchGames(){
let input=document.getElementById("search").value.toLowerCase();
let games=document.querySelectorAll(".game");
games.forEach(game=>{
if(game.innerText.toLowerCase().includes(input)){
game.style.display="";
}else{
game.style.display="none";
}
});
}
</script>
</body>
</html>
