<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Library</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:15px 0;
border:none;
border-radius:10px;
}

.games{
display:flex;
flex-direction:column;
gap:10px;
}

.game{
display:block;
padding:15px;
background:#222;
border-radius:10px;
color:white;
text-decoration:none;
}

.game:hover{
background:#333;
}
</style>
</head>

<body>

<h1>🎮 Game Library</h1>

<input id="search" placeholder="Search games..." onkeyup="searchGames()">

<div class="games" id="games">

<a class="game" href="game1.html">⭐ Game 1 - Platformer</a>

<a class="game" href="game2.html">🖱️ Game 2 - Clicker Game</a>

<a class="game" href="game3.html">⚡ Game 3 - Dodge Game</a>

<a class="game" href="game4.html">🧩 Game 4 - Maze Game</a>

</div>

<script>
function searchGames(){
let input=document.getElementById("search").value.toLowerCase();
let games=document.querySelectorAll(".game");

games.forEach(game=>{
let text=game.innerText.toLowerCase();
game.style.display=text.includes(input)?"block":"none";
});
}
</script>

</body>
</html>
