<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin:10px 0 20px;
box-sizing:border-box;
}

.categories{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
margin-bottom:15px;
}

.cat{
background:#222;
padding:6px 10px;
border-radius:8px;
font-size:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:#1e1e1e;
border-radius:12px;
overflow:hidden;
text-decoration:none;
color:white;
transition:0.2s;
transform:scale(1);
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:100px;
object-fit:cover;
display:block;
}

.card-content{
padding:10px;
}

.small{
font-size:12px;
color:#aaa;
}

.featured{
background:#222;
padding:15px;
border-radius:12px;
margin-bottom:15px;
text-align:center;
}

.playbtn{
display:inline-block;
margin-top:8px;
padding:10px 15px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<h1>🎮 Game Hub</h1>

<input id="search" placeholder="Search games..." onkeyup="searchGames()">

<div class="featured">
<h3>⭐ Featured Game</h3>
<p>Play Sky Cube Platformer now</p>
<a class="playbtn" href="game7.html">Play Now</a>
</div>

<div class="categories">
<div class="cat">Platformer</div>
<div class="cat">Clicker</div>
<div class="cat">Dodge</div>
<div class="cat">Puzzle</div>
</div>

<div class="grid" id="games">

<a class="card" href="game1.html">
<img src="https://picsum.photos/300/200?1">
<div class="card-content">
<strong>Game 1</strong>
<div class="small">Platformer</div>
</div>
</a>

<a class="card" href="game2.html">
<img src="https://picsum.photos/300/200?2">
<div class="card-content">
<strong>Game 2</strong>
<div class="small">Clicker Game</div>
</div>
</a>

<a class="card" href="game3.html">
<img src="https://picsum.photos/300/200?3">
<div class="card-content">
<strong>Game 3</strong>
<div class="small">Dodge Game</div>
</div>
</a>

<a class="card" href="game4.html">
<img src="https://picsum.photos/300/200?4">
<div class="card-content">
<strong>Game 4</strong>
<div class="small">Maze Game</div>
</div>
</a>

<a class="card" href="game5.html">
<img src="https://picsum.photos/300/200?5">
<div class="card-content">
<strong>Game 5</strong>
<div class="small">Flappy Bird</div>
</div>
</a>

<a class="card" href="game6.html">
<img src="https://picsum.photos/300/200?6">
<div class="card-content">
<strong>Game 6</strong>
<div class="small">Sky Cube Platformer</div>
</div>
</a>

<a class="card" href="game7.html">
<img src="https://picsum.photos/300/200?7">
<div class="card-content">
<strong>Game 7</strong>
<div class="small">New Adventure</div>
</div>
</a>

</div>

<script>
function searchGames(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let text=card.innerText.toLowerCase();
card.style.display=text.includes(input) ? "block" : "none";
});
}
</script>

</body>
</html>
