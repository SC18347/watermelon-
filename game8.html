<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Color Mixing Sandbox</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin:14px 0 6px;
    font-size:20px;
}

#toolbar{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:10px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.selected{
    outline:3px solid #fff;
}

#grid{
    display:grid;
    grid-template-columns:repeat(8, 34px);
    grid-template-rows:repeat(12, 34px);
    gap:2px;
    padding:8px;
    background:#fff;
    border-radius:12px;
}

.cell{
    width:34px;
    height:34px;
    background:#fff;
    border:1px solid #aaa;
}
</style>
</head>

<body>

<h1>Color Mixing Sandbox</h1>

<div id="toolbar">
    <button id="reset">Reset</button>
    <button id="eraser">Eraser</button>

    <button class="color selected" data-color="red" style="background:red;">Red</button>
    <button class="color" data-color="blue" style="background:blue;">Blue</button>
    <button class="color" data-color="yellow" style="background:yellow;color:#000;">Yellow</button>
    <button class="color" data-color="black" style="background:black;">Black</button>
    <button class="color" data-color="white" style="background:white;color:#000;">White</button>
</div>

<div id="grid"></div>

<script>
const grid = document.getElementById("grid");
const colorButtons = document.querySelectorAll(".color");

let selected = "red";

/* 12x8 grid */
for(let i=0;i<96;i++){
    const cell = document.createElement("div");
    cell.className = "cell";

    cell.dataset.r = 255;
    cell.dataset.g = 255;
    cell.dataset.b = 255;

    cell.addEventListener("click", ()=>{
        applyPaint(cell, selected);
    });

    grid.appendChild(cell);
}

/* color selection */
colorButtons.forEach(btn=>{
    btn.addEventListener("click", ()=>{
        colorButtons.forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        selected = btn.dataset.color;
    });
});

/* eraser */
document.getElementById("eraser").addEventListener("click", ()=>{
    selected = "white";
    colorButtons.forEach(b=>b.classList.remove("selected"));
});

/* reset */
document.getElementById("reset").addEventListener("click", ()=>{
    document.querySelectorAll(".cell").forEach(c=>{
        c.style.background = "#fff";
        c.dataset.r = 255;
        c.dataset.g = 255;
        c.dataset.b = 255;
    });
});

/* paint logic with mixing */
function applyPaint(cell, colorName){

    const base = {
        red:[255,0,0],
        blue:[0,0,255],
        yellow:[255,255,0],
        black:[0,0,0],
        white:[255,255,255]
    }[colorName];

    let r = parseInt(cell.dataset.r);
    let g = parseInt(cell.dataset.g);
    let b = parseInt(cell.dataset.b);

    r = Math.round((r + base[0]) / 2);
    g = Math.round((g + base[1]) / 2);
    b = Math.round((b + base[2]) / 2);

    /* white lightens */
    if(colorName === "white"){
        r = Math.min(255, r + 50);
        g = Math.min(255, g + 50);
        b = Math.min(255, b + 50);
    }

    /* black darkens */
    if(colorName === "black"){
        r = Math.floor(r * 0.6);
        g = Math.floor(g * 0.6);
        b = Math.floor(b * 0.6);
    }

    cell.dataset.r = r;
    cell.dataset.g = g;
    cell.dataset.b = b;

    cell.style.background = `rgb(${r},${g},${b})`;
}
</script>

</body>
</html>
