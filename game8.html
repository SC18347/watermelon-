<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Mixing Sandbox</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#000;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin:15px 0 5px;
}

#toolbarTop,
#toolbarBottom{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:10px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.color{
    color:white;
}

.selected{
    outline:4px solid white;
}

#grid{
    display:grid;
    grid-template-columns:repeat(8,45px);
    grid-template-rows:repeat(12,45px);
    gap:2px;
    background:white;
    padding:8px;
    border-radius:10px;
    margin:10px 0;
}

.cell{
    width:45px;
    height:45px;
    background:white;
    border:1px solid #999;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>Color Mixing Sandbox</h1>

<div id="toolbarTop">
    <button id="reset">Reset Canvas</button>

    <button class="color selected" style="background:red;" data-color="red">Red</button>
    <button class="color" style="background:blue;" data-color="blue">Blue</button>
    <button class="color" style="background:yellow;color:black;" data-color="yellow">Yellow</button>
</div>

<div id="grid"></div>

<div id="toolbarBottom">
    <button class="color" style="background:black;" data-color="black">Black</button>
    <button class="color" style="background:gray;" data-color="gray">Gray</button>
    <button class="color" style="background:white;color:black;border:1px solid #000;" data-color="white">White</button>
</div>

<script>
const grid = document.getElementById("grid");
const buttons = document.querySelectorAll("[data-color]");
let selected = "red";

// Create 8×12 grid (96 cells)
for(let i = 0; i < 96; i++){
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.color = "white";

    cell.onclick = () => {
        let current = cell.dataset.color;
        let result = mix(current, selected);

        cell.dataset.color = result;
        cell.style.background = result;
    };

    grid.appendChild(cell);
}

// Select color
buttons.forEach(btn=>{
    btn.onclick=()=>{
        buttons.forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        selected = btn.dataset.color;
    };
});

// Reset canvas
document.getElementById("reset").onclick = ()=>{
    document.querySelectorAll(".cell").forEach(cell=>{
        cell.dataset.color = "white";
        cell.style.background = "white";
    });
};

// Mixing rules
function mix(a,b){

    if(a==="white") return b;
    if(b==="white") return a;

    if(a===b) return a;

    let pair=[a,b].sort().join("-");

    switch(pair){

        // Primary colors
        case "blue-red":
            return "purple";

        case "red-yellow":
            return "orange";

        case "blue-yellow":
            return "green";

        // Black, Gray, White
        case "black-white":
            return "gray";

        case "black-gray":
            return "black";

        case "gray-white":
            return "gray";

        // Simple dark versions
        case "black-red":
            return "maroon";

        case "black-blue":
            return "navy";

        case "black-yellow":
            return "olive";

        case "blue-gray":
            return "steelblue";

        case "gray-red":
            return "indianred";

        case "gray-yellow":
            return "khaki";

        default:
            return "brown";
    }
}
</script>

</body>
</html
