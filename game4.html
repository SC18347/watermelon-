<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reaction Grid</title>

<style>
body{
margin:0;
background:#0b0b14;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,95px);
grid-template-rows:repeat(3,95px);
gap:10px;
}

.tile{
background:#222;
border-radius:12px;
opacity:0.6;
transition:0.1s;
}
</style>
</head>

<body>

<div id="hud">
Score: 0<br>
High Score: 0<br>
Time: 1.0s
</div>

<div class="grid" id="grid"></div>

<script>

const grid=document.getElementById("grid");
const hud=document.getElementById("hud");

let tiles=[];
let active=-1;

let score=0;
let timeLimit=1000;
let timer=null;
let alive=true;

/* HIGH SCORE (LOAD) */
let highScore = localStorage.getItem("reaction_highscore");
if(highScore === null) highScore = 0;
highScore = Number(highScore);

/* BUILD GRID */
for(let i=0;i<9;i++){
let t=document.createElement("div");
t.className="tile";

t.addEventListener("click",()=>hit(i));

tiles.push(t);
grid.appendChild(t);
}

/* UPDATE HUD */
function updateHUD(timeLeft=1){
hud.innerHTML=
`Score: ${score}<br>
High Score: ${highScore}<br>
Time: ${timeLeft.toFixed(2)}s`;
}

/* NEXT TILE */
function next(){

if(!alive) return;

/* reset tiles */
tiles.forEach(t=>{
t.style.background="#222";
t.style.opacity=0.6;
});

/* pick random */
active=Math.floor(Math.random()*9);
tiles[active].style.background=
`hsl(${Math.random()*360},90%,60%)`;
tiles[active].style.opacity=1;

/* timer */
clearTimeout(timer);

let start=Date.now();

timer=setTimeout(()=>{
gameOver();
},timeLimit);

/* countdown display */
let tick=setInterval(()=>{
let left=(timeLimit-(Date.now()-start))/1000;
updateHUD(left);

if(left<=0 || !alive){
clearInterval(tick);
}
},30);
}

/* HIT */
function hit(i){

if(!alive) return;

if(i===active){
score++;

/* speed up */
timeLimit=Math.max(350,timeLimit-10);

next();
}else{
gameOver();
}
}

/* GAME OVER */
function gameOver(){
alive=false;

/* save high score */
if(score > highScore){
highScore = score;
localStorage.setItem("reaction_highscore", highScore);
}

updateHUD(0);

setTimeout(()=>{
alert("Game Over! Score: "+score);
location.reload();
},100);
}

/* START */
updateHUD(1);
next();

</script>

</body>
</html>
