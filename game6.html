<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash</title>
    <style>
        body { margin: 0; background: #0a0a14; color: #fff; font-family: sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { background: #101026; border: 3px solid #00ff66; max-width: 95vw; max-height: 70vh; aspect-ratio: 16/9; box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); }
        h1 { margin: 5px; text-shadow: 0 0 10px #00ff66; font-size: 1.8rem; }
    </style>
</head>
<body>
    <div id="container">
        <h1>Score: <span id="score">0</span></h1>
        <canvas id="dashCanvas" width="640" height="360"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("dashCanvas");
        const ctx = canvas.getContext("2d");

        let player = { x: 80, y: 260, size: 30, vy: 0, gravity: 1.2, jumpForce: -16, isGrounded: true };
        let obstacles = [], score = 0, gameActive = true, obstacleTimer = 0;

        // Unified Trigger Input
        function triggerJump() {
            if (player.isGrounded && gameActive) {
                player.vy = player.jumpForce;
                player.isGrounded = false;
            }
        }

        // Event Listeners
        document.addEventListener("keydown", e => { if (e.key === "ArrowUp" || e.key === " " || e.key === "w") triggerJump(); });
        window.addEventListener("touchstart", e => { e.preventDefault(); triggerJump(); }, { passive: false });

        function update() {
            if (!gameActive) return;

            // Physics
            player.vy += player.gravity;
            player.y += player.vy;

            // Floor Collision
            if (player.y >= 260) {
                player.y = 260;
                player.vy = 0;
                player.isGrounded = true;
            }

            // Spawn Spikes
            obstacleTimer++;
            if (obstacleTimer > Math.max(50, 100 - score * 2)) {
                obstacles.push({ x: canvas.width, y: 260, width: 25, height: 30, speed: 5 + score * 0.2 });
                obstacleTimer = 0;
            }

            // Move & Check Obstacles
            obstacles.forEach((obs, index) => {
                obs.x -= obs.speed;

                // Hitbox Collision Detection
                if (player.x < obs.x + obs.width && player.x + player.size > obs.x && player.y < obs.y + obs.height && player.y + player.size > obs.y) {
                    gameActive = false;
                    alert(`Crash! Final Score: ${score}`);
                    location.reload();
                }

                // Score Point
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    score++;
                    document.getElementById("score").textContent = score;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Ground line
            ctx.strokeStyle = "#333355";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, 290); ctx.lineTo(canvas.width, 290); ctx.stroke();

            // Setup Neon Glow
            ctx.shadowBlur = 12;

            // Player (Glow Green Block)
            ctx.fillStyle = "#00ff66";
            ctx.shadowColor = "#00ff66";
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Obstacles (Glow Pink Spikes)
            ctx.fillStyle = "#ff0055";
            ctx.shadowColor = "#ff0055";
            obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y + obs.height);
                ctx.lineTo(obs.x + obs.width / 2, obs.y);
                ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                ctx.closePath();
                ctx.fill();
            });

            ctx.shadowBlur = 0;
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
