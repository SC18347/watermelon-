<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watermelon Gaming</title>

<style>
body{
margin:0;
background:black;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP TITLE */
#title{
text-align:center;
font-size:24px;
padding-top:30px;
}

/* CENTER AREA */
#center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
gap:40px;
}

/* BUTTON WRAPPER (white curved rectangle) */
.box{
background:white;
padding:20px 40px;
border-radius:20px;
cursor:pointer;
transition:0.2s;
}

.box:hover{
transform:scale(1.05);
}

/* BUTTON TEXT */
.box span{
color:black;
font-size:18px;
font-weight:bold;
}

/* BOTTOM */
#bottom{
text-align:center;
padding:15px;
opacity:0.7;
font-size:12px;
}
</style>
</head>

<body>

<div id="title">Watermelon Gaming</div>

<div id="center">

<div class="box" onclick="go('library.html')">
<span>Library</span>
</div>

<div class="box" onclick="go('about.html')">
<span>About</span>
</div>

</div>

<div id="bottom">SC smith</div>

<script>
function go(page){
window.location.href = page;
}
</script>

</body>
</html>
