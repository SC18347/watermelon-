<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>watermelon is the best</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#top{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

button{
padding:10px 14px;
border-radius:10px;
border:1px solid #333;
background:#111;
color:white;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#121225;
padding:15px;
border-radius:15px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
background:#1a1a35;
}

.small{
opacity:0.6;
font-size:12px;
margin-top:5px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="top">
<h2>🕹️ Arcade Hub</h2>
<button onclick="arcadeMode()">Arcade Mode 🎲</button>
</div>

<div id="grid"></div>

<script>

/* STAR BACKGROUND */
const bg=document.getElementById("bg");
const ctx=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let stars=[];
for(let i=0;i<100;i++){
stars.push({
x:Math.random()*bg.width,
y:Math.random()*bg.height,
s:Math.random()*2
});
}

function loop(){
ctx.clearRect(0,0,bg.width,bg.height);
ctx.fillStyle="white";

stars.forEach(s=>{
s.y+=0.2;
if(s.y>bg.height)s.y=0;
ctx.fillRect(s.x,s.y,s.s,s.s);
});

requestAnimationFrame(loop);
}
loop();

/* GAMES LIST (IMPORTANT FILE NAMES) */
let games=[
{file:"reaction.html",name:"Reaction Grid",cat:"Speed"},
{file:"asteroids.html",name:"Asteroids",cat:"Arcade"},
{file:"maze.html",name:"Rhythm Maze",cat:"Puzzle"}
];

/* RENDER */
const grid=document.getElementById("grid");

games.forEach(g=>{
let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<b>${g.name}</b>
<div class="small">${g.cat}</div>
`;

d.onclick=()=>{
window.location.href=g.file;
};

grid.appendChild(d);
});

/* RANDOM MODE */
function arcadeMode(){
let pick=games[Math.floor(Math.random()*games.length)];
window.location.href=pick.file;
}

</script>

</body>
</html>
