<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asteroids Classic</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

/* SHIP */
let ship={
x:c.width/2,
y:c.height/2,
vx:0,
vy:0,
angle:0
};

/* GAME */
let bullets=[];
let rocks=[];

/* INPUT */
let keys={};

addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") shoot();
});
addEventListener("keyup",e=>keys[e.key]=false);

/* SHOOT */
function shoot(){
bullets.push({
x:ship.x,
y:ship.y,
vx:Math.cos(ship.angle)*7,
vy:Math.sin(ship.angle)*7
});
}

/* ASTEROIDS */
function spawn(size=70){
rocks.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,
size:size
});
}

for(let i=0;i<6;i++) spawn(70);

/* LOOP */
function loop(){

/* ROTATE RIGHT ONLY */
if(keys["ArrowRight"]) ship.angle += 0.06;

/* 🚀 NEW: ACCELERATION (replaces left turn) */
if(keys["ArrowLeft"]){
ship.vx += Math.cos(ship.angle)*0.06;
ship.vy += Math.sin(ship.angle)*0.06;
}

/* THRUST FORWARD (still exists via ArrowUp) */
if(keys["ArrowUp"]){
ship.vx += Math.cos(ship.angle)*0.1;
ship.vy += Math.sin(ship.angle)*0.1;
}

/* FRICTION (keeps speed controlled) */
ship.vx *= 0.99;
ship.vy *= 0.99;

/* MOVE */
ship.x += ship.vx;
ship.y += ship.vy;

/* WRAP */
if(ship.x<0) ship.x=c.width;
if(ship.x>c.width) ship.x=0;
if(ship.y<0) ship.y=c.height;
if(ship.y>c.height) ship.y=0;

/* BULLETS */
bullets.forEach((b,i)=>{
b.x+=b.vx;
b.y+=b.vy;

if(b.x<0||b.x>c.width||b.y<0||b.y>c.height){
bullets.splice(i,1);
}
});

/* ASTEROIDS */
rocks.forEach((r,ri)=>{
r.x+=r.vx;
r.y+=r.vy;

if(r.x<0) r.x=c.width;
if(r.x>c.width) r.x=0;
if(r.y<0) r.y=c.height;
if(r.y>c.height) r.y=0;

/* collision */
bullets.forEach((b,bi)=>{
let dx=r.x-b.x;
let dy=r.y-b.y;

if(Math.sqrt(dx*dx+dy*dy)<r.size){

bullets.splice(bi,1);
rocks.splice(ri,1);

if(r.size>20){
rocks.push(
{x:r.x,y:r.y,vx:Math.random()*2,vy:Math.random()*2,size:r.size/2},
{x:r.x,y:r.y,vx:-Math.random()*2,vy:-Math.random()*2,size:r.size/2}
);
}
}
});
});

/* DRAW */
ctx.clearRect(0,0,c.width,c.height);

/* SHIP */
ctx.save();
ctx.translate(ship.x,ship.y);
ctx.rotate(ship.angle);
ctx.strokeStyle="white";
ctx.beginPath();
ctx.moveTo(18,0);
ctx.lineTo(-12,-10);
ctx.lineTo(-8,0);
ctx.lineTo(-12,10);
ctx.closePath();
ctx.stroke();
ctx.restore();

/* BULLETS */
ctx.fillStyle="white";
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,2,2);
});

/* ASTEROIDS */
ctx.strokeStyle="white";
rocks.forEach(r=>{
ctx.beginPath();
ctx.arc(r.x,r.y,r.size,0,Math.PI*2);
ctx.stroke();
});

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
