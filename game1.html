<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Craftsman Jigsaw Builder</title>
    <style>
        body { margin: 0; background: #f2efeb; color: #2c2520; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ui { display: flex; gap: 30px; align-items: center; margin-bottom: 15px; width: 90%; max-width: 800px; justify-content: space-between; }
        h1 { margin: 0; font-size: 1.6rem; font-weight: 600; color: #4a3e3d; letter-spacing: -0.5px; }
        canvas { background: #e6e1da; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08), inset 0 2px 4px rgba(255,255,255,0.8); max-width: 95vw; max-height: 75vh; aspect-ratio: 4/3; border: 1px solid #d4cdc3; }
        .btn { background: #4a3e3d; color: #fff; border: none; padding: 10px 20px; font-size: 0.95rem; font-weight: 500; border-radius: 6px; cursor: pointer; transition: background 0.2s, transform 0.1s; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .btn:hover { background: #5c4e4c; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Wood-Block Canvas Builder</h1>
        <button class="btn" onclick="initializeGame()">Scramble Board</button>
    </div>
    <canvas id="puzzleCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("puzzleCanvas");
        const ctx = canvas.getContext("2d");

        const numCols = 4;
        const numRows = 3;
        const pieceWidth = 110;
        const pieceHeight = 110;
        
        const boardOffsetX = (canvas.width - (numCols * pieceWidth)) / 2;
        const boardOffsetY = (canvas.height - (numRows * pieceHeight)) / 2;

        let pieces = [];
        let selectedPiece = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // Warm, natural craft color palettes
        const colorPalette = ["#b85d43", "#3f6a58", "#466375", "#dca842", "#70546d", "#8c6e51"];
        let designGrid = [];

        function generateRandomDesign() {
            designGrid = [];
            for (let r = 0; r < numRows; r++) {
                designGrid[r] = [];
                for (let c = 0; c < numCols; c++) {
                    designGrid[r][c] = {
                        color: colorPalette[(r * numCols + c) % colorPalette.length],
                        patternType: (r + c) % 3 // Shapes: 0=Diagonal Split, 1=Circle Accent, 2=Dual Bar
                    };
                }
            }
        }

        function initializeGame() {
            pieces = [];
            selectedPiece = null;
            generateRandomDesign();

            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let targetX = boardOffsetX + (c * pieceWidth);
                    let targetY = boardOffsetY + (r * pieceHeight);

                    // Scatter blocks naturally on left and right side margins
                    let onLeft = Math.random() > 0.5;
                    let currentX = onLeft ? Math.random() * (boardOffsetX - pieceWidth - 20) + 10 : canvas.width - boardOffsetX + (Math.random() * (boardOffsetX - pieceWidth - 20)) + 10;
                    let currentY = Math.random() * (canvas.height - pieceHeight - 40) + 20;

                    pieces.push({
                        row: r, col: c,
                        targetX: targetX, targetY: targetY,
                        x: currentX, y: currentY,
                        isSnapped: false
                    });
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Inset Mounting Tray Base Plate
            ctx.fillStyle = "#ded9d0";
            ctx.fillRect(boardOffsetX, boardOffsetY, numCols * pieceWidth, numRows * pieceHeight);
            
            // Soft inner grid guide lines
            ctx.strokeStyle = "#cfc8be";
            ctx.lineWidth = 1;
            for (let r = 0; r <= numRows; r++) {
                ctx.beginPath(); ctx.moveTo(boardOffsetX, boardOffsetY + r * pieceHeight); ctx.lineTo(boardOffsetX + numCols * pieceWidth, boardOffsetY + r * pieceHeight); ctx.stroke();
            }
            for (let c = 0; c <= numCols; c++) {
                ctx.beginPath(); ctx.moveTo(boardOffsetX + c * pieceWidth, boardOffsetY); ctx.lineTo(boardOffsetX + c * pieceWidth, boardOffsetY + numRows * pieceHeight); ctx.stroke();
            }

            // 2. Render Static Snapped Pieces
            pieces.forEach(p => { if (p.isSnapped) drawPiece(p); });

            // 3. Render Loose Loose Pieces with standard canvas shadows
            pieces.forEach(p => {
                if (!p.isSnapped && p !== selectedPiece) {
                    ctx.save();
                    ctx.shadowColor = "rgba(40, 30, 25, 0.12)";
                    ctx.shadowBlur = 6;
                    ctx.shadowOffsetY = 4;
                    drawPiece(p);
                    ctx.restore();
                }
            });

            // 4. Render Active Dragging Item with High-Elevation Drop Shadow
            if (selectedPiece) {
                ctx.save();
                ctx.shadowColor = "rgba(40, 30, 25, 0.22)";
                ctx.shadowBlur = 14;
                ctx.shadowOffsetY = 10;
                drawPiece(selectedPiece);
                ctx.restore();
            }
        }

        function drawPiece(p) {
            ctx.save();
            
            // Matte structural wood-tile surface look
            ctx.fillStyle = "#fcfaf7";
            ctx.fillRect(p.x, p.y, pieceWidth, pieceHeight);

            // Render Art Graphic Layer
            let art = designGrid[p.row][p.col];
            ctx.fillStyle = art.color;
            
            let padding = 12;
            let innerW = pieceWidth - (padding * 2);
            let innerH = pieceHeight - (padding * 2);
            let ix = p.x + padding;
            let iy = p.y + padding;

            ctx.save();
            // Clip design art neatly inside the block padding parameters
            ctx.beginPath();
            ctx.rect(ix, iy, innerW, innerH);
            ctx.clip();

            if (art.patternType === 0) {
                ctx.beginPath();
                ctx.moveTo(ix, iy);
                ctx.lineTo(ix + innerW, iy + innerH);
                ctx.lineTo(ix, iy + innerH);
                ctx.closePath(); ctx.fill();
            } else if (art.patternType === 1) {
                ctx.beginPath();
                ctx.arc(ix + innerW/2, iy + innerH/2, innerW/2.5, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillRect(ix, iy + innerH/3, innerW, innerH/3);
            }
            ctx.restore();

            // Crisp wood tile borders
            ctx.strokeStyle = p.isSnapped ? "#b0a89e" : "#8a7e75";
            ctx.lineWidth = p.isSnapped ? 1 : 1.5;
            ctx.strokeRect(p.x, p.y, pieceWidth, pieceHeight);

            ctx.restore();
        }

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handleStart(clientX, clientY) {
            const coords = getCanvasCoords(clientX, clientY);
            for (let i = pieces.length - 1; i >= 0; i--) {
                let p = pieces[i];
                if (!p.isSnapped && coords.x >= p.x && coords.x <= p.x + pieceWidth && coords.y >= p.y && coords.y <= p.y + pieceHeight) {
                    selectedPiece = p;
                    dragOffsetX = coords.x - p.x;
                    dragOffsetY = coords.y - p.y;
                    pieces.splice(i, 1);
                    pieces.push(selectedPiece); // Dynamic top sorting element adjustment
                    break;
                }
            }
        }

        function handleMove(clientX, clientY) {
            if (!selectedPiece) return;
            const coords = getCanvasCoords(clientX, clientY);
            selectedPiece.x = coords.x - dragOffsetX;
            selectedPiece.y = coords.y - dragOffsetY;
            draw();
        }

        function handleEnd() {
            if (!selectedPiece) return;
            let distance = Math.hypot(selectedPiece.x - selectedPiece.targetX, selectedPiece.y - selectedPiece.targetY);
            
            if (distance < 20) { // Snapping lock padding margin check
                selectedPiece.x = selectedPiece.targetX;
                selectedPiece.y = selectedPiece.targetY;
                selectedPiece.isSnapped = true;
                selectedPiece = null;
                draw();
                checkVictory();
            } else {
                selectedPiece = null;
                draw();
            }
        }

        function checkVictory() {
            if (pieces.every(p => p.isSnapped)) {
                setTimeout(() => { alert("Artboard fully assembled!"); }, 150);
            }
        }

        // Multitouch Parsing Hardware Interfaces
        canvas.addEventListener("mousedown", e => handleStart(e.clientX, e.clientY));
        window.addEventListener("mousemove", e => handleMove(e.clientX, e.clientY));
        window.addEventListener("mouseup", () => handleEnd());

        canvas.addEventListener("touchstart", e => {
            if (e.touches.length === 1) handleStart(e.touches.clientX, e.touches.clientY);
        }, { passive: true });
        window.addEventListener("touchmove", e => {
