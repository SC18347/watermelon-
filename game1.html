<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Art Board Builder</title>
    <style>
        body { margin: 0; background: #111116; color: #fff; font-family: sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ui { display: flex; gap: 20px; align-items: center; margin-bottom: 12px; width: 95%; max-width: 960px; justify-content: space-between; }
        h1 { margin: 0; font-size: 1.3rem; }
        #inst { margin: 0; font-size: 0.9rem; color: #a1a1aa; }
        canvas { background: #09090d; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); max-width: 98vw; max-height: 75vh; aspect-ratio: 4/3; border: 2px solid #27272a; cursor: pointer; }
        button { background: #2563eb; color: #fff; border: none; padding: 10px 20px; font-weight: 600; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <div><h1>Gallery Art Board</h1><p id="inst">Click a side piece, then click an empty grid box</p></div>
        <button onclick="init()">Scramble Art</button>
    </div>
    <canvas id="cv" width="960" height="720"></canvas>

    <script>
        const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
        const cols = 4, rows = 3, w = 140, h = 140, bx = (960 - cols*w)/2, by = (720 - rows*h)/2;
        let pieces = [], selected = null, layers = [];
        const pals = [["#ef4444", "#3b82f6", "#f59e0b", "#10b981", "#8b5cf6"], ["#1e293b", "#f8fafc", "#e2e8f0", "#475569", "#0f172a"], ["#ff7b00", "#ffb703", "#023047", "#219ebc", "#8ecae6"]];

        function makeArt() {
            layers = []; const p = pals[Math.floor(Math.random() * pals.length)];
            layers.push({t:'bg', c:p[0]});
            for(let i=0; i<4; i++) layers.push({t:'f', x:bx+Math.random()*cols*w, y:by+Math.random()*rows*h, r:120+Math.random()*150, c:p[1+(i%4)]});
            for(let i=0; i<6; i++) layers.push({t:'l', x1:bx+Math.random()*cols*w, y1:by+Math.random()*rows*h, x2:bx+Math.random()*cols*w, y2:by+Math.random()*rows*h, w:2+Math.random()*8, c:p[Math.floor(Math.random()*p.length)]});
            for(let i=0; i<4; i++) layers.push({t:'r', x:bx+Math.random()*cols*w, y:by+Math.random()*rows*h, r:30+Math.random()*60, w:3+Math.random()*6, c:p[Math.floor(Math.random()*p.length)]});
        }

        function drawArt(c, ox=0, oy=0) {
            layers.forEach(l => {
                c.fillStyle = l.c; c.strokeStyle = l.c; c.lineWidth = l.w;
                if(l.t=='bg') c.fillRect(ox, oy, cols*w, rows*h);
                else if(l.t=='f') { c.beginPath(); c.arc(l.x-bx+ox, l.y-by+oy, l.r, 0, Math.PI*2); c.fill(); }
                else if(l.t=='l') { c.beginPath(); c.moveTo(l.x1-bx+ox, l.y1-by+oy); c.lineTo(l.x2-bx+ox, l.y2-by+oy); c.stroke(); }
                else if(l.t=='r') { c.beginPath(); c.arc(l.x-bx+ox, l.y-by+oy, l.r, 0, Math.PI*2); c.stroke(); }
            });
        }

        function init() {
            pieces = []; selected = null; updateUI("Click a side piece, then click an empty grid box", "#a1a1aa"); makeArt();
            let spawns = [];
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    let sx = Math.random()>0.5 ? 15+Math.random()*(bx-w-30) : 960-bx+15+Math.random()*(bx-w-30);
                    spawns.push({x: sx, y: 30+Math.random()*(720-h-60)});
                }
            }
            spawns.sort(() => Math.random() - 0.5);
            let idx = 0;
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    let pos = spawns[idx++];
                    pieces.push({id: r*cols+c, r, c, tx: bx+c*w, ty: by+r*h, x: pos.x, y: pos.y, gr: -1, gc: -1, s: false});
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, 960, 720);
            ctx.fillStyle = "#18181c"; ctx.fillRect(0, 0, bx-10, 720); ctx.fillRect(960-bx+10, 0, bx-10, 720);
            ctx.fillStyle = "#0d0d11"; ctx.fillRect(bx, by, cols*w, rows*h);
            ctx.strokeStyle = "#3f3f46"; ctx.lineWidth = 1.5;
            for(let r=0; r<=rows; r++) { ctx.beginPath(); ctx.moveTo(bx, by+r*h); ctx.lineTo(bx+cols*w, by+r*h); ctx.stroke(); }
            for(let c=0; c<=cols; c++) { ctx.beginPath(); ctx.moveTo(bx+c*w, by); ctx.lineTo(bx+c*w, by+rows*h); ctx.stroke(); }
            
            pieces.forEach(p => {
                ctx.save(); ctx.beginPath(); ctx.rect(p.x, p.y, w, h); ctx.clip();
                drawArt(ctx, p.x - bx - p.c*w, p.y - by - p.r*h); ctx.restore();
                ctx.strokeStyle = p === selected ? "#3b82f6" : (p.s ? "rgba(16,185,129,0.4)" : "#000");
                ctx.lineWidth = p === selected ? 4 : 2; ctx.strokeRect(p.x, p.y, w, h);
            });
        }

        function click(cx, cy) {
            const r = cv.getBoundingClientRect(), mx = (cx - r.left) * (960 / r.width), my = (cy - r.top) * (720 / r.height);
            let hit = pieces.find(p => mx >= p.x && mx <= p.x+w && my >= p.y && my <= p.y+h);
            if (hit && !hit.s) { selected = hit; updateUI("Piece Selected! Click its target grid box", "#3b82f6"); draw(); return; }
            if (selected && mx >= bx && mx <= bx+cols*w && my >= by && my <= by+rows*h) {
                let cc = Math.floor((mx - bx) / w), cr = Math.floor((my - by) / h);
                if (!pieces.some(p => p.gr === cr && p.gc === cc)) {
                    selected.x = bx+cc*w; selected.y = by+cr*h; selected.gr = cr; selected.gc = cc;
                    if (selected.r === cr && selected.c === cc) selected.s = true;
                    selected = null; updateUI("Piece positioned! Select another piece", "#10b981"); draw();
                    if (pieces.every(p => p.s)) { updateUI("Masterpiece Assembled!", "#10b981"); alert("Assembled!"); }
                }
            }
        }

        function updateUI(t, c) { const i = document.getElementById("inst"); i.textContent = t; i.style.color = c; }
        cv.addEventListener("click", e => click(e.clientX, e.clientY));
        cv.addEventListener("touchstart", e => { if(e.touches.length==1) click(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
        init();
    </script>
</body>
</html>
