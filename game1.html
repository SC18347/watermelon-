<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrast Puzzle Builder</title>
    <style>
        body { margin: 0; background: #1a1a24; color: #ffffff; font-family: sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ui { display: flex; gap: 20px; align-items: center; margin-bottom: 15px; width: 90%; max-width: 800px; justify-content: space-between; }
        h1 { margin: 0; font-size: 1.4rem; font-weight: bold; color: #ffffff; }
        canvas { background: #111116; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-width: 95vw; max-height: 75vh; aspect-ratio: 4/3; border: 2px solid #3a3a4a; }
        .btn { background: #3b82f6; color: #fff; border: none; padding: 10px 22px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Contrast Puzzle Builder</h1>
        <button class="btn" onclick="initializeGame()">Scramble</button>
    </div>
    <canvas id="puzzleCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("puzzleCanvas");
        const ctx = canvas.getContext("2d");

        const numCols = 4;
        const numRows = 3;
        const pieceWidth = 110;
        const pieceHeight = 110;
        
        const boardOffsetX = (canvas.width - (numCols * pieceWidth)) / 2;
        const boardOffsetY = (canvas.height - (numRows * pieceHeight)) / 2;

        let pieces = [];
        let selectedPiece = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // Solid, high-visibility solid color blocks
        const blockColors = ["#ef4444", "#10b981", "#3b82f6", "#f59e0b", "#ec4899", "#8b5cf6"];
        let designGrid = [];

        function generateRandomDesign() {
            designGrid = [];
            for (let r = 0; r < numRows; r++) {
                designGrid[r] = [];
                for (let c = 0; c < numCols; c++) {
                    designGrid[r][c] = {
                        color: blockColors[(r * numCols + c) % blockColors.length],
                        symbol: (r + c) % 3 
                    };
                }
            }
        }

        function initializeGame() {
            pieces = [];
            selectedPiece = null;
            generateRandomDesign();

            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let targetX = boardOffsetX + (c * pieceWidth);
                    let targetY = boardOffsetY + (r * pieceHeight);

                    // Force spawn blocks entirely inside visible black side margins
                    let onLeft = Math.random() > 0.5;
                    let currentX = onLeft ? Math.random() * (boardOffsetX - pieceWidth - 30) + 15 : canvas.width - boardOffsetX + (Math.random() * (boardOffsetX - pieceWidth - 30)) + 15;
                    let currentY = Math.random() * (canvas.height - pieceHeight - 40) + 20;

                    pieces.push({
                        row: r, col: c,
                        targetX: targetX, targetY: targetY,
                        x: currentX, y: currentY,
                        isSnapped: false
                    });
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Visible Sidebar Holding Trays (Highlights where blocks spawn)
            ctx.fillStyle = "#161622";
            ctx.fillRect(0, 0, boardOffsetX - 10, canvas.height);
            ctx.fillRect(canvas.width - boardOffsetX + 10, 0, boardOffsetX - 10, canvas.height);

            // 2. Draw Center Target Grid Frame
            ctx.fillStyle = "#09090d";
            ctx.fillRect(boardOffsetX, boardOffsetY, numCols * pieceWidth, numRows * pieceHeight);
            
            // Bright white target outline slots
            ctx.strokeStyle = "#4b5563";
            ctx.lineWidth = 2;
            for (let r = 0; r <= numRows; r++) {
                ctx.beginPath(); ctx.moveTo(boardOffsetX, boardOffsetY + r * pieceHeight); ctx.lineTo(boardOffsetX + numCols * pieceWidth, boardOffsetY + r * pieceHeight); ctx.stroke();
            }
            for (let c = 0; c <= numCols; c++) {
                ctx.beginPath(); ctx.moveTo(boardOffsetX + c * pieceWidth, boardOffsetY); ctx.lineTo(boardOffsetX + c * pieceWidth, boardOffsetY + numRows * pieceHeight); ctx.stroke();
            }

            // 3. Render Pieces
            pieces.forEach(p => { if (p.isSnapped) drawPiece(p); });
            pieces.forEach(p => { if (!p.isSnapped && p !== selectedPiece) drawPiece(p); });

            // 4. Render Active Drag Item with High Visibility Stroke
            if (selectedPiece) {
                ctx.save();
                ctx.shadowColor = "#000000";
                ctx.shadowBlur = 15;
                drawPiece(selectedPiece, true);
                ctx.restore();
            }
        }

        function drawPiece(p, isDragging = false) {
            ctx.save();
            
            // Piece base backing block
            ctx.fillStyle = "#2e2e3e"; 
            ctx.fillRect(p.x, p.y, pieceWidth, pieceHeight);

            // Graphic Artwork Core Layer
            let art = designGrid[p.row][p.col];
            let pad = 10;
            ctx.fillStyle = art.color;
            ctx.fillRect(p.x + pad, p.y + pad, pieceWidth - (pad * 2), pieceHeight - (pad * 2));

            // Interior High Contrast Geometric Markings
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 4;
            let cx = p.x + (pieceWidth / 2);
            let cy = p.y + (pieceHeight / 2);

            if (art.symbol === 0) {
                ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI * 2); ctx.fill();
            } else if (art.symbol === 1) {
                ctx.fillRect(cx - 15, cy - 15, 30, 30);
            } else {
                ctx.beginPath();
                ctx.moveTo(cx - 15, cy - 15); ctx.lineTo(cx + 15, cy + 15);
                ctx.moveTo(cx + 15, cy - 15); ctx.lineTo(cx - 15, cy + 15);
                ctx.stroke();
            }

            // Heavy Piece Edge Outline (Thick borders so they are highly visible)
            ctx.strokeStyle = p.isSnapped ? "#10b981" : (isDragging ? "#ffffff" : "#000000");
            ctx.lineWidth = isDragging ? 4 : 3;
            ctx.strokeRect(p.x, p.y, pieceWidth, pieceHeight);

            ctx.restore();
        }

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handleStart(clientX, clientY) {
            const coords = getCanvasCoords(clientX, clientY);
            for (let i = pieces.length - 1; i >= 0; i--) {
                let p = pieces[i];
                if (!p.isSnapped && coords.x >= p.x && coords.x <= p.x + pieceWidth && coords.y >= p.y && coords.y <= p.y + pieceHeight) {
                    selectedPiece = p;
                    dragOffsetX = coords.x - p.x;
                    dragOffsetY = coords.y - p.y;
                    pieces.splice(i, 1);
                    pieces.push(selectedPiece);
                    break;
                }
            }
        }

        function handleMove(clientX, clientY) {
            if (!selectedPiece) return;
            const coords = getCanvasCoords(clientX, clientY);
            selectedPiece.x = coords.x - dragOffsetX;
            selectedPiece.y = coords.y - dragOffsetY;
            draw();
        }

        function handleEnd() {
            if (!selectedPiece) return;
            let distance = Math.hypot(selectedPiece.x - selectedPiece.targetX, selectedPiece.y - selectedPiece.targetY);
            
            if (distance < 25) { 
                selectedPiece.x = selectedPiece.targetX;
                selectedPiece.y = selectedPiece.targetY;
                selectedPiece.isSnapped = true;
                selectedPiece = null;
                draw();
                checkVictory();
            } else {
                selectedPiece = null;
                draw();
            }
        }

        function checkVictory() {
            if (pieces.every(p => p.isSnapped)) {
                setTimeout(() => { alert("Puzzle Constructed Successfully!"); }, 100);
            }
        }

        canvas.addEventListener("mousedown", e => handleStart(e.clientX, e.clientY));
        window.addEventListener("mousemove", e => handleMove(e.clientX, e.clientY));
        window.addEventListener("mouseup", () => handleEnd());

        canvas.addEventListener("touchstart", e => {
            if (e.touches.length === 1) handleStart(e.touches.clientX, e.touches.clientY);
        }, { passive: true });
        window.addEventListener("touchmove", e => {
            if (e.touches.length === 1) handleMove(e.touches.clientX, e.touches.clientY);
        }, { passive: true });
        window.addEventListener("touchend", () => handleEnd());

        initializeGame();
    </script>
</body>
</html>
